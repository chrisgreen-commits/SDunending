<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows & Daylight: Avalon Unending</title>
    <style>
        :root {
            --ui-gold: #ffd700;
            --ui-bg: rgba(15, 15, 25, 0.95);
            --accent: #a8dadc;
            --danger: #ff4d4d;
            --platform-grey: #8d9196;
            --platform-highlight: #b0b4b9;
        }
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #050505;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        #game-wrapper {
            position: relative;
            width: 1920px;
            height: 1080px;
            background: #000;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            overflow: hidden;
            transform-origin: center;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-top {
            position: absolute;
            top: 40px;
            left: 40px;
            background: var(--ui-bg);
            border-left: 5px solid var(--ui-gold);
            padding: 20px 30px;
            backdrop-filter: blur(10px);
            min-width: 450px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }
        #level-name {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--ui-gold);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        #objective-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #objective-label {
            font-size: 1.1rem;
            color: #aaa;
            text-transform: uppercase;
        }
        #key-counter {
            margin-top: 15px;
            font-size: 1.6rem;
            color: var(--ui-gold);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #key-counter span {
            font-family: Arial, sans-serif;
        }
        .powerup-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .hud-powerup {
            background: var(--ui-bg);
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            min-width: 300px;
        }
        .hud-powerup.active {
            opacity: 1;
            transform: translateY(0);
        }
        #wing-indicator.active {
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            border: 2px solid var(--ui-gold);
        }
        #caffeine-indicator.active {
            box-shadow: 0 0 30px rgba(255, 140, 0, 0.4);
            border: 2px solid #ff8c00;
        }
        #watermark {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 1rem;
            color: rgba(255, 215, 0, 0.3);
            letter-spacing: 4px;
            pointer-events: none;
        }
        #message-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
            backdrop-filter: blur(20px);
        }
        .btn {
            background: var(--ui-gold);
            color: black;
            border: none;
            padding: 20px 60px;
            font-weight: bold;
            font-size: 1.4rem;
            cursor: pointer;
            margin-top: 50px;
            text-transform: uppercase;
            transition: all 0.2s;
            pointer-events: auto;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--ui-gold);
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="watermark">AVALON UNENDING v0.07</div>
        
        <div class="hud-top">
            <div id="level-name">LEVEL 1: THE CRUMBLING REACH</div>
            <div id="objective-container">
                <span id="objective-label">OBJECTIVE: </span>
                <span id="objective-text" style="color: #ccc; text-transform: uppercase;">Topple walls to bridge gaps.</span>
            </div>
            <div id="key-counter">
                🔑 <span id="keys-found">0</span> / <span id="keys-total">25</span>
            </div>
        </div>

        <div class="powerup-container">
            <div class="hud-powerup" id="caffeine-indicator">
                <span style="font-size: 2.5rem; filter: drop-shadow(0 0 10px #ff8c00);">☕</span>
                <div>
                    <div style="font-size: 1.2rem; font-weight: bold; color: #ff8c00; letter-spacing: 1px;">CAFFEINE OVERDRIVE</div>
                    <div style="font-size: 0.8rem; color: #fff; opacity: 0.8; text-transform: uppercase;">Speed Multiplier: 2.0x</div>
                </div>
            </div>
            <div class="hud-powerup" id="wing-indicator">
                <span style="font-size: 2.5rem; filter: drop-shadow(0 0 10px gold);">🪽</span>
                <div>
                    <div style="font-size: 1.2rem; font-weight: bold; color: var(--ui-gold); letter-spacing: 1px;">AERIAL ASCENSION</div>
                    <div style="font-size: 0.8rem; color: #fff; opacity: 0.8; text-transform: uppercase;">Triple Jump Online</div>
                </div>
            </div>
        </div>
    </div>

    <div id="message-overlay">
        <div id="message-content">
            <h1 id="overlay-title" style="color: var(--ui-gold); font-size: 4rem;">LEVEL COMPLETE</h1>
            <p id="overlay-text" style="font-size: 1.5rem;">The architecture of Avalon shifts beneath you.</p>
            <button class="btn" id="next-level-btn">LOAD NEXT LEVEL</button>
        </div>
    </div>
</div>

<script>
/**
 * SHADOWS & DAYLIGHT: AVALON UNENDING
 * Version: 0.07 - FULL RESTORATION
 */

const CONFIG = {
    GRAVITY: 0.45,
    FRICTION: 0.82,
    WALK_SPEED: 0.9,
    RUN_SPEED: 1.8,
    MAX_WALK_SPEED: 7.5,
    MAX_RUN_SPEED: 13.0,
    JUMP_FORCE: 14.5,
    INTERNAL_WIDTH: 1920,
    INTERNAL_HEIGHT: 1080,
    LEVEL_LENGTH: 30, // In chunks
    PLAYER_PHYS_HEIGHT: 120,
    PLAYER_PHYS_WIDTH: 60,
    PLAYER_BASE_HEIGHT: 206 * 1.15, // Native sprite height scaled up
    REQUIRED_KEYS: 25,
    BRICK_SIZE: 60,
    ATTACK_COOLDOWN: 15,
    PLATFORM_COLOR: '#8d9196',
    PLATFORM_HIGHLIGHT: '#b0b4b9'
};

class Particle {
    constructor(x, y, text, color = "white") {
        this.x = x;
        this.y = y;
        this.text = text;
        this.color = color;
        this.life = 60;
        this.vy = -1.5;
        this.vx = (Math.random() - 0.5) * 2;
        this.opacity = 1.0;
    }
    update() {
        this.y += this.vy;
        this.x += this.vx;
        this.life--;
        this.opacity = this.life / 60;
    }
    draw(ctx, cameraX) {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = this.color;
        ctx.font = "bold 24px Courier New";
        ctx.textAlign = "center";
        ctx.fillText(this.text, this.x - cameraX, this.y);
        ctx.restore();
    }
}

class Brick {
    constructor(x, y, localY = 0) {
        this.x = x;
        this.y = y;
        this.localY = localY; // Relative to wall container
        this.w = CONFIG.BRICK_SIZE;
        this.h = CONFIG.BRICK_SIZE;
        this.health = 3;
        this.destroyed = false;
        this.flash = 0;
    }
    damage() {
        this.health--;
        this.flash = 10;
        if (this.health <= 0) this.destroyed = true;
    }
    draw(ctx, cameraX) {
        if (this.destroyed) return;
        ctx.fillStyle = this.flash > 0 ? '#fff' : CONFIG.PLATFORM_COLOR;
        if (this.flash > 0) this.flash--;
        ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
        ctx.strokeStyle = CONFIG.PLATFORM_HIGHLIGHT;
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x - cameraX + 2, this.y + 2, this.w - 4, this.h - 4);
    }
}

class Wall {
    constructor(x, y, bricks) {
        this.x = x;
        this.y = y;
        this.bricks = bricks; // Array of Brick objects
        this.isToppled = false;
        this.toppleProgress = 0; // 0 to 1
        this.direction = 1; // 1 for right, -1 for left
        this.w = CONFIG.BRICK_SIZE;
        this.h = bricks.length * CONFIG.BRICK_SIZE;
        this.vx = 0;
        this.vy = 0;
    }
    topple(dir) {
        if (!this.isToppled) {
            this.isToppled = true;
            this.direction = dir;
        }
    }
    update(staticBricks) {
        if (this.isToppled && this.toppleProgress < 1) {
            this.toppleProgress += 0.1;
        }
        if (this.isToppled && this.toppleProgress >= 1) {
            // After toppled 90 degrees, it acts as a horizontal platform that can fall
            this.vy += CONFIG.GRAVITY;
            this.y += this.vy;
            this.x += this.vx;
            this.vx *= 0.8;

            // Simplified collision for the toppled wall
            const wallW = this.h;
            const wallH = CONFIG.BRICK_SIZE;
            for (let b of staticBricks) {
                if (b.destroyed) continue;
                if (this.x < b.x + b.w && this.x + wallW > b.x && this.y < b.y + b.h && this.y + wallH > b.y) {
                    if (this.vy >= 0 && this.y + wallH - this.vy <= b.y + 10) {
                        this.y = b.y - wallH;
                        this.vy = 0;
                    }
                }
            }
        }
    }
    draw(ctx, cameraX) {
        ctx.save();
        ctx.translate(this.x - cameraX, this.y);
        if (this.isToppled) {
            // Rotate around bottom corner
            ctx.translate(this.w / 2, this.h);
            ctx.rotate((Math.PI/2) * this.toppleProgress * this.direction);
            ctx.translate(-this.w / 2, -this.h);
        }
        for (let b of this.bricks) {
            if (b.destroyed) continue;
            ctx.fillStyle = b.flash > 0 ? '#fff' : CONFIG.PLATFORM_COLOR;
            if (b.flash > 0) b.flash--;
            ctx.fillRect(0, b.localY, CONFIG.BRICK_SIZE, CONFIG.BRICK_SIZE);
            ctx.strokeStyle = CONFIG.PLATFORM_HIGHLIGHT;
            ctx.strokeRect(2, b.localY + 2, CONFIG.BRICK_SIZE - 4, CONFIG.BRICK_SIZE - 4);
        }
        ctx.restore();
    }
}

class Player {
    constructor(game) {
        this.game = game;
        this.width = 108; // Visual width based on sprite aspect
        this.reset();
        this.loadAssets();
    }

    async loadAssets() {
        const sources = {
            idle: 'WinterIdle.png',
            walk1: 'WinterWalk1.png',
            walk2: 'WinterWalk2.png',
            run1: 'WinterRun1.png',
            run2: 'WinterRun2.png',
            jump: 'WinterJumpS.png',
            land: 'WinterLandS.png',
            kick: 'WinterKick.png',
            kickLow: 'WinterKick2.png'
        };
        this.sprites = {};
        for (let [k, src] of Object.entries(sources)) {
            const img = new Image();
            img.src = src;
            this.sprites[k] = img;
        }
        this.assetsLoaded = true;
    }

    reset() {
        this.x = 0;
        this.y = 0;
        this.vx = 0;
        this.vy = 0;
        this.direction = 1;
        this.grounded = false;
        this.isRunning = false;
        this.state = 'idle';
        this.animFrame = 0;
        this.animTimer = 0;
        this.keysCollected = 0;
        this.hasWings = false;
        this.hasCoffee = false;
        this.extraJumps = 0;
        this.attackTimer = 0;
        this.landTimer = 0;
        this.lastTapTime = 0;
        this.lastTapKey = "";
        this.updateUI();
    }

    spawnAt(x, y) {
        this.x = x;
        this.y = y - CONFIG.PLAYER_PHYS_HEIGHT;
        this.vx = 0;
        this.vy = 0;
    }

    updateUI() {
        document.getElementById('keys-found').innerText = this.keysCollected;
        document.getElementById('wing-indicator').classList.toggle('active', this.hasWings);
        document.getElementById('caffeine-indicator').classList.toggle('active', this.hasCoffee);
    }

    update(walls, staticBricks, items) {
        if (this.attackTimer > 0) this.attackTimer--;
        
        const speedMult = this.hasCoffee ? 2.0 : 1.0;
        const inputLeft = keys['a'] || keys['arrowleft'];
        const inputRight = keys['d'] || keys['arrowright'];

        if (!inputLeft && !inputRight) {
            this.isRunning = false;
        }

        if (inputLeft) {
            this.vx -= (this.isRunning ? CONFIG.RUN_SPEED : CONFIG.WALK_SPEED) * speedMult;
            this.direction = -1;
        }
        if (inputRight) {
            this.vx += (this.isRunning ? CONFIG.RUN_SPEED : CONFIG.WALK_SPEED) * speedMult;
            this.direction = 1;
        }

        const maxSpeed = (this.isRunning ? CONFIG.MAX_RUN_SPEED : CONFIG.MAX_WALK_SPEED) * speedMult;
        this.vx = Math.max(-maxSpeed, Math.min(maxSpeed, this.vx * CONFIG.FRICTION));
        this.x += this.vx;
        this.vy += CONFIG.GRAVITY;
        this.y += this.vy;

        // Simple Collision
        let wasGrounded = this.grounded;
        this.grounded = false;

        const physPad = (this.width - CONFIG.PLAYER_PHYS_WIDTH) / 2;
        const physH = CONFIG.PLAYER_PHYS_HEIGHT;

        // Static brick collision
        for (let b of staticBricks) {
            if (b.destroyed) continue;
            if (this.x + physPad < b.x + b.w && this.x + this.width - physPad > b.x && this.y < b.y + b.h && this.y + physH > b.y) {
                if (this.vy >= 0 && this.y + physH - this.vy <= b.y + 35) {
                    this.y = b.y - physH;
                    this.vy = 0;
                    this.grounded = true;
                    if (this.hasWings) this.extraJumps = 2;
                } else if (this.vx > 0 && this.x + this.width - physPad <= b.x + 20) {
                    this.x = b.x - this.width + physPad;
                    this.vx = 0;
                } else if (this.vx < 0 && this.x + physPad >= b.x + b.w - 20) {
                    this.x = b.x + b.w - physPad;
                    this.vx = 0;
                }
            }
        }

        // Wall collision and kick logic
        for (let w of walls) {
            const wallX = w.x;
            const wallY = w.y;
            const wallW = w.isToppled ? w.h : w.w;
            const wallH = w.isToppled ? w.w : w.h;

            if (this.x + physPad < wallX + wallW && this.x + this.width - physPad > wallX && this.y < wallY + wallH && this.y + physH > wallY) {
                if (w.isToppled) {
                    if (this.vy >= 0 && this.y + physH - this.vy <= wallY + 30) {
                        this.y = wallY - physH;
                        this.vy = 0;
                        this.grounded = true;
                        if (this.hasWings) this.extraJumps = 2;
                    }
                } else {
                    if (this.vx > 0 && this.x + this.width - physPad <= wallX + 20) {
                        this.x = wallX - this.width + physPad;
                        this.vx = 0;
                    } else if (this.vx < 0 && this.x + physPad >= wallX + wallW - 20) {
                        this.x = wallX + wallW - physPad;
                        this.vx = 0;
                    }
                }
            }

            // Kicking logic
            if (keys['k'] && this.attackTimer === 0) {
                const attackBox = {
                    x: this.direction === 1 ? this.x + 80 : this.x - 30,
                    y: this.y + 50,
                    w: 60,
                    h: 100
                };
                for (let b of w.bricks) {
                    const bx = w.x;
                    const by = w.y + b.localY;
                    if (!b.destroyed && attackBox.x < bx + CONFIG.BRICK_SIZE && attackBox.x + attackBox.w > bx && attackBox.y < by + CONFIG.BRICK_SIZE && attackBox.y + attackBox.h > by) {
                        b.damage();
                        this.game.particles.push(new Particle(bx + 30, by, "CRACK!", "#ccc"));
                        // Check if wall should topple
                        const activeBricks = w.bricks.filter(br => !br.destroyed);
                        if (activeBricks.length <= 2) {
                            w.topple(this.direction);
                            this.game.particles.push(new Particle(bx, by - 40, "TOPPLING!", "var(--ui-gold)"));
                        }
                    }
                }
            }
        }

        if (keys['k'] && this.attackTimer === 0) {
            this.attackTimer = CONFIG.ATTACK_COOLDOWN;
        }

        if (keys['JumpPressed'] && (this.grounded || (this.hasWings && this.extraJumps > 0))) {
            this.vy = -CONFIG.JUMP_FORCE * (this.hasCoffee ? 1.15 : 1.0);
            if (!this.grounded) this.extraJumps--;
            this.grounded = false;
            keys['JumpPressed'] = false;
        }

        if (this.grounded && !wasGrounded) {
            this.landTimer = 10;
        }
        if (this.landTimer > 0) this.landTimer--;

        // Animation state determination
        let nextState = 'idle';
        if (!this.grounded) {
            nextState = 'jump';
        } else if (this.attackTimer > CONFIG.ATTACK_COOLDOWN - 8) {
            nextState = 'kick';
        } else if (this.landTimer > 0) {
            nextState = 'land';
        } else if (Math.abs(this.vx) > 1.5) {
            nextState = this.isRunning ? 'run' : 'walk';
        }
        
        if (this.state !== nextState) {
            this.state = nextState;
            this.animFrame = 0;
            this.animTimer = 0;
        }

        // Simple sprite frame flipping
        if (this.state === 'run' || this.state === 'walk') {
            const cycleSpeed = this.state === 'run' ? 5 : 10;
            if (++this.animTimer >= cycleSpeed) {
                this.animFrame = (this.animFrame + 1) % 2;
                this.animTimer = 0;
            }
        }

        // Item Collection
        for (let item of items) {
            if (!item.collected && this.x + physPad < item.x + 40 && this.x + this.width - physPad > item.x) {
                if (this.y < item.y + 60 && this.y + physH > item.y) {
                    item.collected = true;
                    if (item.type === 'key') {
                        this.keysCollected++;
                        this.game.particles.push(new Particle(item.x, item.y, "+1 KEY", "gold"));
                    } else if (item.type === 'wings') {
                        this.hasWings = true;
                        this.game.particles.push(new Particle(item.x, item.y, "WINGS GAINED", "cyan"));
                    } else if (item.type === 'coffee') {
                        this.hasCoffee = true;
                        this.game.particles.push(new Particle(item.x, item.y, "CAFFEINE OVERLOAD", "#ff8c00"));
                    }
                    this.updateUI();
                }
            }
        }

        // Fall death
        if (this.y > CONFIG.INTERNAL_HEIGHT + 500) {
            this.spawnAt(0, 500);
            this.game.particles.push(new Particle(this.x, 500, "REMATERIALIZING...", "white"));
        }
    }

    draw(ctx, cameraX) {
        ctx.save();
        let img = this.sprites.idle;
        
        switch(this.state) {
            case 'walk':
                img = this.animFrame === 0 ? this.sprites.walk1 : this.sprites.walk2;
                break;
            case 'run':
                img = this.animFrame === 0 ? this.sprites.run1 : this.sprites.run2;
                break;
            case 'jump': img = this.sprites.jump; break;
            case 'land': img = this.sprites.land; break;
            case 'kick': img = this.sprites.kick; break;
        }

        const drawX = this.x - cameraX;
        if (this.direction === -1) {
            ctx.translate(drawX + this.width / 2, 0);
            ctx.scale(-1, 1);
            ctx.translate(-(drawX + this.width / 2), 0);
        }

        // Draw shadow
        if (this.grounded) {
            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.beginPath();
            ctx.ellipse(drawX + this.width/2, this.y + CONFIG.PLAYER_PHYS_HEIGHT, 40, 10, 0, 0, Math.PI*2);
            ctx.fill();
        }

        if (img && img.complete) {
            ctx.drawImage(img, drawX, this.y, this.width, CONFIG.PLAYER_BASE_HEIGHT);
        } else {
            // Fallback box
            ctx.fillStyle = "white";
            ctx.fillRect(drawX + (this.width-CONFIG.PLAYER_PHYS_WIDTH)/2, this.y, CONFIG.PLAYER_PHYS_WIDTH, CONFIG.PLAYER_PHYS_HEIGHT);
        }
        ctx.restore();
    }
}

class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = 1920;
        this.canvas.height = 1080;
        this.player = new Player(this);
        this.gameState = 'PLAYING';
        this.bricks = [];
        this.walls = [];
        this.items = [];
        this.particles = [];
        this.cameraX = 0;
        this.currentLevelIndex = 0;
        this.exit = null;

        this.initLevel();
        window.addEventListener('resize', () => this.handleResize());
        this.handleResize();
        this.setupButtons();
        this.loop();
    }

    setupButtons() {
        document.getElementById('next-level-btn').onclick = () => this.nextLevel();
    }

    handleResize() {
        const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
        document.getElementById('game-wrapper').style.transform = `scale(${scale})`;
    }

    initLevel() {
        this.bricks = [];
        this.walls = [];
        this.items = [];
        this.particles = [];
        this.cameraX = 0;
        this.gameState = 'PLAYING';

        const levelData = [
            { name: "The Crumbling Reach", keys: 12, length: 25 },
            { name: "Logic's Gate", keys: 20, length: 35 },
            { name: "Sovereign Descent", keys: 25, length: 45 }
        ][this.currentLevelIndex % 3];

        document.getElementById('level-name').innerText = `LEVEL ${this.currentLevelIndex + 1}: ${levelData.name.toUpperCase()}`;
        document.getElementById('keys-total').innerText = levelData.keys;
        CONFIG.REQUIRED_KEYS = levelData.keys;
        CONFIG.LEVEL_LENGTH = levelData.length;

        // Procedural level generation
        let currentX = 0;
        for (let i = 0; i < CONFIG.LEVEL_LENGTH; i++) {
            // Platform
            const platformWidth = 5 + Math.floor(Math.random() * 8);
            for (let j = 0; j < platformWidth; j++) {
                this.bricks.push(new Brick(currentX + j * 60, 800));
            }

            // Occasional higher platforms
            if (Math.random() > 0.6) {
                const subWidth = 3 + Math.floor(Math.random() * 3);
                for (let j = 0; j < subWidth; j++) {
                    this.bricks.push(new Brick(currentX + j * 60, 550));
                }
            }

            // Walls that need toppling
            if (Math.random() > 0.3 && i < CONFIG.LEVEL_LENGTH - 1) {
                const wallHeight = 4 + Math.floor(Math.random() * 5);
                const wallBricks = [];
                for (let k = 0; k < wallHeight; k++) {
                    wallBricks.push(new Brick(0, 0, k * 60));
                }
                this.walls.push(new Wall(currentX + (platformWidth - 1) * 60, 800 - wallHeight * 60, wallBricks));
            }

            // Keys
            if (i % 2 === 0) {
                this.items.push({ x: currentX + 120, y: 740, type: 'key', collected: false });
            }

            // Powerups
            if (i === 4) this.items.push({ x: currentX + 200, y: 740, type: 'coffee', collected: false });
            if (i === 12) this.items.push({ x: currentX + 200, y: 740, type: 'wings', collected: false });

            // Gap
            currentX += (platformWidth + 4 + Math.floor(Math.random() * 5)) * 60;
        }

        // Exit gate
        this.exit = {
            x: currentX,
            y: 680,
            w: 120,
            h: 120,
            active: false
        };

        this.player.reset();
        this.player.spawnAt(100, 700);
    }

    nextLevel() {
        this.currentLevelIndex++;
        document.getElementById('message-overlay').style.display = 'none';
        this.initLevel();
    }

    update() {
        if (this.gameState !== 'PLAYING') return;

        this.player.update(this.walls, this.bricks, this.items);
        for (let w of this.walls) w.update(this.bricks);
        for (let p of this.particles) p.update();
        this.particles = this.particles.filter(p => p.life > 0);

        // Smooth camera
        const targetCamX = this.player.x - 600;
        this.cameraX += (targetCamX - this.cameraX) * 0.08;
        this.cameraX = Math.max(0, this.cameraX);

        // Check level complete
        if (this.player.x > this.exit.x && this.player.keysCollected >= CONFIG.REQUIRED_KEYS) {
            this.gameState = 'PAUSED';
            document.getElementById('message-overlay').style.display = 'flex';
        }
    }

    draw() {
        // Clear background
        const grad = this.ctx.createRadialGradient(960, 540, 0, 960, 540, 1000);
        grad.addColorStop(0, '#121225');
        grad.addColorStop(1, '#050505');
        this.ctx.fillStyle = grad;
        this.ctx.fillRect(0, 0, 1920, 1080);

        // Grid dots for depth
        this.ctx.fillStyle = "rgba(255,215,0,0.05)";
        for (let x = 0; x < 1920; x += 100) {
            for (let y = 0; y < 1080; y += 100) {
                const offX = -(this.cameraX * 0.2) % 100;
                this.ctx.fillRect(x + offX, y, 2, 2);
            }
        }

        for (let b of this.bricks) b.draw(this.ctx, this.cameraX);
        for (let w of this.walls) w.draw(this.ctx, this.cameraX);
        
        for (let itm of this.items) {
            if (itm.collected) continue;
            this.ctx.save();
            this.ctx.font = "40px Arial";
            const emoji = itm.type === 'key' ? '🔑' : (itm.type === 'wings' ? '🪽' : '☕');
            const bounce = Math.sin(Date.now() / 200) * 10;
            this.ctx.fillText(emoji, itm.x - this.cameraX, itm.y + bounce);
            this.ctx.restore();
        }

        // Exit Gate
        this.ctx.save();
        this.ctx.strokeStyle = this.player.keysCollected >= CONFIG.REQUIRED_KEYS ? "var(--ui-gold)" : "#333";
        this.ctx.lineWidth = 10;
        this.ctx.setLineDash(this.player.keysCollected >= CONFIG.REQUIRED_KEYS ? [] : [10, 10]);
        this.ctx.strokeRect(this.exit.x - this.cameraX, this.exit.y, this.exit.w, this.exit.h);
        this.ctx.fillStyle = "white";
        this.ctx.font = "bold 20px Courier New";
        this.ctx.textAlign = "center";
        this.ctx.fillText("EXIT", this.exit.x - this.cameraX + 60, this.exit.y + 65);
        this.ctx.restore();

        this.player.draw(this.ctx, this.cameraX);
        for (let p of this.particles) p.draw(this.ctx, this.cameraX);
    }

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
}

// Input handling
const keys = {};
window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    
    // Check for double tap
    if ((k === 'd' || k === 'arrowright' || k === 'a' || k === 'arrowleft') && !keys[k]) {
        const now = Date.now();
        if (k === game.player.lastTapKey && (now - game.player.lastTapTime) < 300) {
            game.player.isRunning = true;
        }
        game.player.lastTapTime = now;
        game.player.lastTapKey = k;
    }
    
    keys[k] = true;
    if (k === 'w' || k === 'arrowup' || e.code === 'Space') keys['JumpPressed'] = true;
});
window.addEventListener('keyup', e => {
    keys[e.key.toLowerCase()] = false;
    if (e.code === 'Space') keys['JumpPressed'] = false;
});

let game;
window.onload = () => {
    game = new Game();
};
</script>
