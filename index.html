<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows & Daylight: Avalon Unending</title>
    <style>
        :root {
            --ui-gold: #ffd700;
            --ui-bg: rgba(15, 15, 25, 0.98);
            --accent: #a8dadc;
            --danger: #ff4d4d;
        }
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #050505;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        #game-wrapper {
            position: relative;
            width: 1920px;
            height: 1080px;
            background: #000;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            overflow: hidden;
            transform-origin: center;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-top {
            position: absolute;
            top: 40px;
            left: 40px;
            background: var(--ui-bg);
            border-left: 5px solid var(--ui-gold);
            padding: 20px 30px;
            backdrop-filter: blur(10px);
            min-width: 450px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }
        #level-name {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--ui-gold);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        #objective-label {
            font-size: 1.1rem;
            color: #aaa;
            text-transform: uppercase;
        }
        #key-counter {
            margin-top: 15px;
            font-size: 1.6rem;
            color: var(--ui-gold);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .hud-powerup {
            position: absolute;
            bottom: 40px;
            left: 40px;
            background: var(--ui-bg);
            padding: 20px 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
        }
        .hud-powerup.active {
            opacity: 1;
            transform: translateY(0);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            border: 2px solid var(--ui-gold);
        }

        #message-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
            backdrop-filter: blur(20px);
        }
        #message-content h1 {
            font-size: 4rem;
            color: var(--ui-gold);
            margin-bottom: 20px;
            letter-spacing: 5px;
        }
        #message-content p {
            font-size: 1.5rem;
            color: #ccc;
            max-width: 800px;
            line-height: 1.6;
        }
        .btn {
            background: var(--ui-gold);
            color: black;
            border: none;
            padding: 20px 60px;
            font-weight: bold;
            font-size: 1.4rem;
            cursor: pointer;
            margin-top: 50px;
            text-transform: uppercase;
            transition: all 0.2s;
            pointer-events: auto;
        }
        .btn:hover { 
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="hud-top">
            <div id="level-name">INITIALIZING...</div>
            <div id="objective-container">
                <span id="objective-label">OBJECTIVE: </span>
                <span id="objective-text" style="color: #ccc; text-transform: uppercase;">Locate all Access Keys.</span>
            </div>
            <div id="key-counter">🔑 <span id="keys-found">0</span> / 25</div>
        </div>

        <div class="hud-powerup" id="wing-indicator">
            <span style="font-size: 3rem; filter: drop-shadow(0 0 10px gold);">🪽</span>
            <div>
                <div style="font-size: 1.4rem; font-weight: bold; color: var(--ui-gold); letter-spacing: 1px;">AERIAL ASCENSION</div>
                <div style="font-size: 0.9rem; color: #fff; opacity: 0.8; text-transform: uppercase;">Double Jump Online</div>
            </div>
        </div>
    </div>

    <div id="message-overlay">
        <div id="message-content">
            <h1 id="overlay-title">LEVEL COMPLETE</h1>
            <p id="overlay-text">The journey into Avalon continues...</p>
            <button class="btn" id="next-btn" onclick="game.nextLevel()">LOAD NEXT LEVEL</button>
        </div>
    </div>
</div>

<script>
/**
 * SHADOWS & DAYLIGHT: AVALON UNENDING
 * Updates:
 * - Fixed Squashed Logic: Ensured consistent drawH for run cycle.
 * - Lagged State Transition: Prevented instant snapping to idle from high-speed running.
 * - Symmetrical Wings: Flipped the left wing horizontally.
 */

const CONFIG = {
    GRAVITY: 0.45,
    FRICTION: 0.82,
    WALK_SPEED: 0.9,
    RUN_SPEED: 1.8,
    MAX_WALK_SPEED: 7.5,
    MAX_RUN_SPEED: 13.0,
    JUMP_FORCE: 14.5,
    INTERNAL_WIDTH: 1920,
    INTERNAL_HEIGHT: 1080,
    LEVEL_LENGTH: 30,
    PARALLAX_FACTOR: 0.3,
    PLAYER_BASE_HEIGHT: 165,      
    PLAYER_SCALED_HEIGHT: 206.25, 
    PLAYER_RUN_HEIGHT: 154.68,
    ANIM_FPS: 10,
    RUN_ANIM_FPS: 15,
    REQUIRED_KEYS: 25,
    MIN_HEAD_CLEARANCE: 260, 
    MAX_JUMP_REACH: 440,
    LAND_STEP_REQUIREMENT: 320 
};

const LEVELS = [
    { id: 1, name: "Avalon Dungeon", color: "#0c0d14", accent: "#1e2135", hint: "Gather 25 keys to unlock the elevator.", bg: 'Level1Dungeon.png' },
    { id: 2, name: "Neural Pathways", color: "#1a1410", accent: "#2d241d", hint: "Exploration is mandatory to proceed.", bg: 'Level1Dungeon.png' },
    { id: 3, name: "Crystal Spires", color: "#180f1b", accent: "#2d1b33", hint: "Reach the peak of Avalon.", bg: 'Level1Dungeon.png' }
];

class Player {
    constructor() {
        this.height = CONFIG.PLAYER_SCALED_HEIGHT;
        this.width = 108; 
        this.keysCollected = 0;
        this.hasWings = false;
        this.canDoubleJump = false;
        this.assetsLoaded = false;
        this.sprites = {};
        this.animFrame = 0;
        this.animTimer = 0;
        this.state = 'idle';
        this.landStepDistance = 0;
        this.lastTapTime = 0;
        this.lastTapKey = null;
        this.isRunning = false;
        this.reset();
    }

    async loadAssets() {
        const sources = {
            idle: 'WinterIdle.png',
            walk1: 'WinterWalk1.png', 
            walk2: 'WinterWalk2.png', 
            run1: 'WinterRun1.png',
            run2: 'WinterRun2.png',
            jump: 'WinterJumpS.png',
            land: 'WinterLandS.png'
        };

        const loadImg = (src) => new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 72; canvas.height = 108;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = this.isRunning ? '#e74c3c' : '#3498db';
                ctx.fillRect(0,0,72,108);
                resolve(canvas);
            };
            img.src = src;
        });

        const results = await Promise.all(Object.entries(sources).map(async ([key, src]) => {
            const img = await loadImg(src);
            return [key, img];
        }));

        this.sprites = Object.fromEntries(results);
        this.assetsLoaded = true;
    }

    spawnAt(x, y) {
        this.x = x;
        this.y = y - CONFIG.PLAYER_SCALED_HEIGHT; 
        this.vx = 0;
        this.vy = 0;
        this.grounded = true;
        this.state = 'idle';
        this.updateUI();
    }

    reset() {
        this.vx = 0;
        this.vy = 0;
        this.grounded = false;
        this.direction = 1; 
        this.state = 'idle';
        this.isRunning = false;
        this.animFrame = 0;
        this.animTimer = 0;
        this.keysCollected = 0;
        this.hasWings = false;
        this.canDoubleJump = false;
        this.landStepDistance = 0;
        this.updateUI();
    }

    updateUI() {
        const keySpan = document.getElementById('keys-found');
        if(keySpan) keySpan.innerText = this.keysCollected;
        
        const wingInd = document.getElementById('wing-indicator');
        if(wingInd) {
            if(this.hasWings) wingInd.classList.add('active');
            else wingInd.classList.remove('active');
        }
    }

    handleInput() {
        const inputLeft = keys['ArrowLeft'] || keys['a'];
        const inputRight = keys['ArrowRight'] || keys['d'];
        
        // When input is released, we keep isRunning true until friction slows us down
        // to prevent instant frame snapping.
        if (!inputLeft && !inputRight) {
            if (Math.abs(this.vx) < 3.0) {
                this.isRunning = false;
            }
        }

        const accel = this.isRunning ? CONFIG.RUN_SPEED : CONFIG.WALK_SPEED;
        const max = this.isRunning ? CONFIG.MAX_RUN_SPEED : CONFIG.MAX_WALK_SPEED;

        if (inputRight) {
            this.vx += accel;
            this.direction = 1;
        } else if (inputLeft) {
            this.vx -= accel;
            this.direction = -1;
        }
        
        this.vx = Math.max(-max, Math.min(max, this.vx));
    }

    update(platforms, items) {
        let wasGrounded = this.grounded;
        let lastVy = this.vy;
        
        this.handleInput();

        this.vx *= CONFIG.FRICTION;
        this.x += this.vx;

        this.vy += CONFIG.GRAVITY;
        this.y += this.vy;
        
        let foundGround = false;
        // Logic to determine active collision height for physics
        let collisionHeight = CONFIG.PLAYER_SCALED_HEIGHT;
        if (this.state === 'land') collisionHeight = CONFIG.PLAYER_BASE_HEIGHT;
        else if (this.state === 'run' || (this.isRunning && Math.abs(this.vx) > 3.0)) collisionHeight = CONFIG.PLAYER_RUN_HEIGHT;

        const hitboxPadding = this.width * 0.25;

        for (let p of platforms) {
            if (this.x + hitboxPadding < p.x + p.w && this.x + this.width - hitboxPadding > p.x &&
                this.y < p.y + p.h && this.y + collisionHeight > p.y) {
                
                if (this.vy >= 0 && this.y + collisionHeight - this.vy <= p.y + 25) {
                    this.y = p.y - collisionHeight;
                    this.vy = 0;
                    foundGround = true;
                    if (this.hasWings) this.canDoubleJump = true;
                } 
                else if (this.vy < 0 && this.y - this.vy >= p.y + p.h - 25) {
                    this.y = p.y + p.h;
                    this.vy = 0;
                } 
                else if (this.vx > 0 && this.x + this.width - hitboxPadding <= p.x + 25) {
                    this.x = p.x - this.width + hitboxPadding;
                    this.vx = 0;
                } else if (this.vx < 0 && this.x + hitboxPadding >= p.x + p.w - 25) {
                    this.x = p.x + p.w - hitboxPadding;
                    this.vx = 0;
                }
            }
        }

        this.grounded = foundGround;

        if (keys['JumpPressed']) {
            if (this.grounded || (this.hasWings && this.canDoubleJump)) {
                this.vy = this.grounded ? -CONFIG.JUMP_FORCE : -CONFIG.JUMP_FORCE * 0.95;
                if (!this.grounded) this.canDoubleJump = false;
                this.grounded = false;
                this.state = 'jump';
                this.landStepDistance = 0; 
                keys['JumpPressed'] = false;
            }
        }

        if (this.grounded) {
            const isMovingActually = Math.abs(this.vx) > 1.5;

            if (!wasGrounded && lastVy > 1.5) {
                this.state = 'land';
                this.landStepDistance = 0;
            } 
            
            if (this.state === 'land') {
                this.landStepDistance += Math.abs(this.vx);
                if (this.landStepDistance >= CONFIG.LAND_STEP_REQUIREMENT) {
                    this.state = isMovingActually ? (this.isRunning ? 'run' : 'walk') : 'idle';
                }
            } 
            else if (isMovingActually) {
                // Determine if we are running based on current speed or isRunning toggle
                const speedMagnitude = Math.abs(this.vx);
                if (this.isRunning || speedMagnitude > 8.0) {
                    this.state = 'run';
                } else {
                    this.state = 'walk';
                }

                if (this.animTimer++ >= 4) {
                    const frameCount = this.state === 'run' ? 2 : 4;
                    this.animFrame = (this.animFrame + 1) % frameCount; 
                    this.animTimer = 0;
                }
            } 
            else {
                this.state = 'idle';
                this.animFrame = 0;
                this.isRunning = false; // Kill run flag when fully stopped
            }
        } else {
            if (Math.abs(this.vy) > 0.5) {
                this.state = 'jump';
            }
        }

        for (let item of items) {
            if (!item.collected && 
                this.x < item.x + 50 && this.x + this.width > item.x &&
                this.y < item.y + 60 && this.y + collisionHeight > item.y) {
                
                item.collected = true;
                if (item.type === 'key') this.keysCollected++;
                else if (item.type === 'wings') {
                    this.hasWings = true;
                    this.canDoubleJump = true;
                }
                this.updateUI();
            }
        }

        if (this.y > CONFIG.INTERNAL_HEIGHT + 400) {
            const firstPlat = platforms[0];
            this.spawnAt(firstPlat.x + 100, firstPlat.y);
        }
        if (this.x < 0) this.x = 0;
    }

    draw(ctx, cameraX) {
        if (!this.assetsLoaded) return;
        ctx.save();
        
        let screenX = this.x - cameraX;
        let img = this.sprites.idle;
        let drawH = CONFIG.PLAYER_SCALED_HEIGHT;

        if (this.state === 'jump') {
            img = this.sprites.jump;
        } else if (this.state === 'land') {
            img = this.sprites.land;
            drawH = CONFIG.PLAYER_BASE_HEIGHT;
        } else if (this.state === 'run') {
            const seq = [this.sprites.run1, this.sprites.run2];
            img = seq[this.animFrame % 2] || this.sprites.run1;
            drawH = CONFIG.PLAYER_RUN_HEIGHT; 
        } else if (this.state === 'walk') {
            const seq = [this.sprites.idle, this.sprites.walk1, this.sprites.walk2, this.sprites.walk1];
            img = seq[this.animFrame % 4] || this.sprites.idle;
            drawH = CONFIG.PLAYER_SCALED_HEIGHT;
        }

        if (this.direction === -1) {
            ctx.translate(screenX + this.width / 2, 0);
            ctx.scale(-1, 1);
            ctx.translate(-(screenX + this.width / 2), 0);
        }

        const drawW = this.width;
        const xOffset = (this.width - drawW) / 2;
        const yOffset = this.height - drawH;
        
        ctx.drawImage(img, screenX + xOffset, this.y + yOffset, drawW, drawH);

        // Drawing wings
        if (this.hasWings) {
            ctx.font = "64px Arial"; 
            ctx.globalAlpha = 0.85 + Math.sin(Date.now() / 150) * 0.1;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "gold";
            const wingY = this.y + 70 + yOffset;

            // Right wing (standard)
            ctx.fillText("🪽", screenX + this.width + 5, wingY);
            
            // Left wing (flipped)
            ctx.save();
            ctx.translate(screenX - 45 + 32, wingY - 32); // Adjust center
            ctx.scale(-1, 1);
            ctx.fillText("🪽", -32, 32);
            ctx.restore();

            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1.0;
        }
        
        ctx.restore();
    }
}

class Game {
    constructor() {
        this.wrapper = document.getElementById('game-wrapper');
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = CONFIG.INTERNAL_WIDTH;
        this.canvas.height = CONFIG.INTERNAL_HEIGHT;
        
        this.player = new Player();
        this.currentLevelIndex = 0;
        this.platforms = [];
        this.items = [];
        this.backgrounds = {};
        this.exit = { x: 0, y: 0, w: 120, h: 220 };
        this.cameraX = 0;
        this.isPaused = false;

        this.handleResize();
        window.addEventListener('resize', () => this.handleResize());
        this.start();
    }

    handleResize() {
        const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
        this.wrapper.style.transform = `scale(${scale})`;
    }

    async start() {
        await this.loadBackgrounds();
        await this.player.loadAssets();
        this.initLevel();
        this.loop();
    }

    async loadBackgrounds() {
        const bgSources = [...new Set(LEVELS.map(l => l.bg))];
        const loads = bgSources.map(src => new Promise(resolve => {
            const img = new Image();
            img.onload = () => resolve({src, img});
            img.onerror = () => resolve({src, img: null});
            img.src = src;
        }));
        const results = await Promise.all(loads);
        results.forEach(res => {
            if (res.img) this.backgrounds[res.src] = res.img;
        });
    }

    initLevel() {
        const levelData = LEVELS[this.currentLevelIndex];
        document.getElementById('level-name').innerText = `LEVEL ${levelData.id}: ${levelData.name.toUpperCase()}`;
        document.getElementById('objective-text').innerText = levelData.hint;
        
        this.generateLevel();
        this.player.reset();
        
        const firstPlatform = this.platforms[0];
        this.player.spawnAt(firstPlatform.x + 100, firstPlatform.y);
        
        this.cameraX = 0;
        this.isPaused = false;
        document.getElementById('message-overlay').style.display = 'none';
    }

    generateLevel() {
        this.platforms = [];
        this.items = [];
        this.platforms.push({ x: 0, y: 800, w: 900, h: 400 });
        
        let lastX = 800;
        let lastY = 800;
        let keysPlaced = 0;
        let wingsPlaced = false;

        for (let i = 0; i < CONFIG.LEVEL_LENGTH; i++) {
            let gap = 170 + Math.random() * 110;
            let width = 380 + Math.random() * 420;
            let diff = (Math.random() - 0.5) * 350;
            let mainY = Math.max(250, Math.min(850, lastY + diff));
            if (mainY < lastY - CONFIG.MAX_JUMP_REACH) mainY = lastY - CONFIG.MAX_JUMP_REACH;

            const mainPlat = { x: lastX + gap, y: mainY, w: width, h: 60 };
            this.platforms.push(mainPlat);
            
            if (Math.random() > 0.45) {
                let altYOffset = CONFIG.MIN_HEAD_CLEARANCE + 60 + (Math.random() * 80);
                const isBelow = Math.random() > 0.5;
                let altY = mainY + (isBelow ? altYOffset : -altYOffset);
                altY = Math.max(120, Math.min(940, altY));
                
                if (Math.abs(altY - mainY) < CONFIG.MIN_HEAD_CLEARANCE) {
                    altY = mainY - CONFIG.MIN_HEAD_CLEARANCE - 20; 
                }

                let altWidth = 320 + Math.random() * 280;
                
                if (altY > mainY) {
                    if (altWidth < mainPlat.w) altWidth = mainPlat.w + 100;
                } else {
                    if (mainPlat.w < altWidth) mainPlat.w = altWidth + 100;
                }

                this.platforms.push({ x: lastX + gap + 40, y: altY, w: altWidth, h: 40 });
                
                if (keysPlaced < CONFIG.REQUIRED_KEYS) {
                    this.items.push({ x: lastX + gap + 100 + (altWidth/2), y: altY - 80, type: 'key', collected: false });
                    keysPlaced++;
                }

                if (!wingsPlaced && i > 3 && Math.random() > 0.65) {
                    this.items.push({ x: lastX + gap + 150, y: altY - 100, type: 'wings', collected: false });
                    wingsPlaced = true;
                }
            } else {
                if (keysPlaced < CONFIG.REQUIRED_KEYS && Math.random() > 0.5) {
                    this.items.push({ x: lastX + gap + width/2, y: mainY - 80, type: 'key', collected: false });
                    keysPlaced++;
                }
            }

            lastX += gap + width;
            lastY = mainY;
        }

        if (!wingsPlaced) {
            let mid = Math.floor(this.platforms.length / 2);
            let p = this.platforms[mid];
            this.items.push({ x: p.x + p.w/2, y: p.y - 120, type: 'wings', collected: false });
        }

        while (keysPlaced < CONFIG.REQUIRED_KEYS) {
            let p = this.platforms[Math.floor(Math.random() * this.platforms.length)];
            this.items.push({ x: p.x + Math.random() * p.w, y: p.y - 80, type: 'key', collected: false });
            keysPlaced++;
        }

        this.exit.x = lastX + 150;
        this.exit.y = lastY - 220;
        this.platforms.push({ x: lastX, y: lastY, w: 900, h: 400 });
    }

    update() {
        if (this.isPaused) return;
        this.player.update(this.platforms, this.items);
        
        let targetCam = this.player.x - (CONFIG.INTERNAL_WIDTH / 3);
        this.cameraX += (targetCam - this.cameraX) * 0.1;
        this.cameraX = Math.max(0, this.cameraX);

        if (this.player.x + this.player.width > this.exit.x && 
            this.player.x < this.exit.x + this.exit.w &&
            this.player.y + this.player.height > this.exit.y &&
            this.player.y < this.exit.y + this.exit.h) {
            if (this.player.keysCollected >= CONFIG.REQUIRED_KEYS) this.completeLevel();
        }
    }

    completeLevel() {
        this.isPaused = true;
        document.getElementById('message-overlay').style.display = 'flex';
    }

    nextLevel() {
        this.currentLevelIndex++;
        if (this.currentLevelIndex >= LEVELS.length) this.currentLevelIndex = 0;
        this.initLevel();
    }

    drawBackground() {
        const level = LEVELS[this.currentLevelIndex];
        const bgImg = this.backgrounds[level.bg];
        if (bgImg) {
            const bgScale = CONFIG.INTERNAL_HEIGHT / bgImg.naturalHeight;
            const bgWidth = bgImg.naturalWidth * bgScale;
            const parallaxX = -(this.cameraX * CONFIG.PARALLAX_FACTOR) % bgWidth;
            for (let x = parallaxX - bgWidth; x < CONFIG.INTERNAL_WIDTH; x += bgWidth) {
                this.ctx.drawImage(bgImg, x, 0, bgWidth, CONFIG.INTERNAL_HEIGHT);
            }
        } else {
            this.ctx.fillStyle = level.color;
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        }
    }

    draw() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        const level = LEVELS[this.currentLevelIndex];
        this.drawBackground();

        for (let p of this.platforms) {
            if (p.x + p.w > this.cameraX && p.x < this.cameraX + CONFIG.INTERNAL_WIDTH) {
                this.ctx.fillStyle = level.accent;
                this.ctx.fillRect(p.x - this.cameraX, p.y, p.w, p.h);
                this.ctx.fillStyle = "rgba(255,255,255,0.12)";
                this.ctx.fillRect(p.x - this.cameraX, p.y, p.w, 4);
            }
        }

        this.ctx.textAlign = "center";
        for (let item of this.items) {
            if (!item.collected && item.x + 100 > this.cameraX && item.x < this.cameraX + CONFIG.INTERNAL_WIDTH) {
                this.ctx.shadowBlur = 25;
                this.ctx.shadowColor = item.type === 'key' ? "gold" : "cyan";
                this.ctx.font = item.type === 'key' ? "55px Arial" : "75px Arial";
                this.ctx.globalAlpha = 0.95 + Math.sin(Date.now() / 200) * 0.05;
                const bounce = Math.sin(Date.now() / 300) * 15;
                this.ctx.fillText(item.type === 'key' ? "🔑" : "🪽", item.x - this.cameraX, item.y + bounce);
                this.ctx.globalAlpha = 1.0;
                this.ctx.shadowBlur = 0;
            }
        }

        const exitReady = this.player.keysCollected >= CONFIG.REQUIRED_KEYS;
        this.ctx.fillStyle = exitReady ? "rgba(0, 255, 127, 0.3)" : "rgba(255, 0, 0, 0.2)";
        this.ctx.fillRect(this.exit.x - this.cameraX, this.exit.y, this.exit.w, this.exit.h);
        this.ctx.strokeStyle = exitReady ? "#00ff7f" : "var(--danger)";
        this.ctx.lineWidth = 6;
        this.ctx.strokeRect(this.exit.x - this.cameraX, this.exit.y, this.exit.w, this.exit.h);
        this.ctx.fillStyle = exitReady ? "#00ff7f" : "white";
        this.ctx.font = "bold 24px Courier New";
        this.ctx.fillText(exitReady ? "OPEN" : "LOCKED", this.exit.x - this.cameraX + this.exit.w/2, this.exit.y + this.exit.h/2);

        this.player.draw(this.ctx, this.cameraX);
    }

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
}

const keys = {};
window.addEventListener('keydown', e => {
    const now = Date.now();
    if ((e.key === 'd' || e.key === 'ArrowRight' || e.key === 'a' || e.key === 'ArrowLeft') && !keys[e.key]) {
        if (e.key === game.player.lastTapKey && (now - game.player.lastTapTime) < 300) {
            game.player.isRunning = true;
        }
        game.player.lastTapTime = now;
        game.player.lastTapKey = e.key;
    }
    keys[e.key] = true;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') keys['JumpPressed'] = true;
});

window.addEventListener('keyup', e => {
    keys[e.key] = false;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') keys['JumpPressed'] = false;
});

let game;
window.onload = () => { game = new Game(); };
</script>
