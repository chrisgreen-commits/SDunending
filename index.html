<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows & Daylight: Avalon Unending</title>
    <style>
        :root {
            --ui-gold: #ffd700;
            --ui-bg: rgba(10, 10, 15, 0.95);
            --accent: #a8dadc;
            --slot-bg: rgba(255, 255, 255, 0.05);
            --slot-border: #444;
            --danger: #ff4d4d;
        }
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #050505;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        #game-wrapper {
            position: relative;
            width: 1920px;
            height: 1080px;
            background: #000;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            overflow: hidden;
            transform-origin: center;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-top {
            position: absolute;
            top: 40px;
            left: 40px;
            background: var(--ui-bg);
            border-left: 5px solid var(--ui-gold);
            padding: 20px 30px;
            backdrop-filter: blur(10px);
            min-width: 400px;
        }
        #level-name {
            font-size: 2rem;
            font-weight: bold;
            color: var(--ui-gold);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        #objective {
            font-size: 1.1rem;
            color: #aaa;
            text-transform: uppercase;
        }
        #key-counter {
            margin-top: 10px;
            font-size: 1.4rem;
            color: var(--ui-gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .hud-powerup {
            position: absolute;
            bottom: 40px;
            left: 40px;
            background: var(--ui-bg);
            padding: 15px 25px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 15px;
            opacity: 0.3;
            transition: opacity 0.3s;
        }
        .hud-powerup.active {
            opacity: 1;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            border: 1px solid var(--ui-gold);
        }

        #inventory-sidebar {
            position: absolute;
            right: 0;
            top: 0;
            width: 120px;
            height: 100%;
            background: var(--ui-bg);
            border-left: 2px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            gap: 15px;
            backdrop-filter: blur(10px);
        }
        .inv-label {
            font-size: 0.7rem;
            color: var(--ui-gold);
            margin-bottom: 10px;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.7;
        }
        .inv-slot {
            width: 70px;
            height: 70px;
            border: 2px solid var(--slot-border);
            background: var(--slot-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            transition: all 0.2s ease;
        }
        .inv-slot.active {
            border-color: var(--ui-gold);
            background: rgba(255, 215, 0, 0.1);
        }

        #message-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
            backdrop-filter: blur(15px);
        }
        #message-content h1 {
            font-size: 3.5rem;
            color: var(--ui-gold);
            margin-bottom: 20px;
        }
        #message-content p {
            font-size: 1.5rem;
            color: #ccc;
        }
        .btn {
            background: var(--ui-gold);
            color: black;
            border: none;
            padding: 20px 60px;
            font-weight: bold;
            font-size: 1.4rem;
            cursor: pointer;
            margin-top: 50px;
            text-transform: uppercase;
            transition: transform 0.1s;
            pointer-events: auto;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="hud-top">
            <div id="level-name">INITIALIZING...</div>
            <div id="objective">Locate all 25 Access Keys.</div>
            <div id="key-counter">🔑 <span id="keys-found">0</span> / 25</div>
        </div>

        <div class="hud-powerup" id="wing-indicator">
            <span style="font-size: 2rem;">🪽</span>
            <div>DOUBLE JUMP ENABLED</div>
        </div>

        <div id="inventory-sidebar">
            <div class="inv-label">Access Keys</div>
            <div class="inv-slot" id="slot-0"></div>
            <div class="inv-slot" id="slot-1"></div>
            <div class="inv-slot" id="slot-2"></div>
            <div class="inv-slot" id="slot-3"></div>
            <div class="inv-slot" id="slot-4"></div>
            <div class="inv-slot" id="slot-5"></div>
            <div class="inv-slot" id="slot-6"></div>
            <div class="inv-slot" id="slot-7"></div>
            <div class="inv-slot" id="slot-8"></div>
            <div class="inv-slot" id="slot-9"></div>
        </div>
    </div>

    <div id="message-overlay">
        <div id="message-content">
            <h1 id="overlay-title">SECTOR SECURED</h1>
            <p id="overlay-text">The search continues...</p>
            <button class="btn" id="next-btn" onclick="game.nextLevel()">ADVANCE TO NEXT SECTOR</button>
        </div>
    </div>
</div>

<script>
/**
 * SHADOWS & DAYLIGHT: AVALON UNENDING
 * Non-Linear Level Update: Branching Paths, Double Jump, and Key Requirement
 */

const CONFIG = {
    GRAVITY: 0.45,
    FRICTION: 0.82,
    PLAYER_SPEED: 0.8,
    MAX_SPEED: 7,
    JUMP_FORCE: 14,
    INTERNAL_WIDTH: 1920,
    INTERNAL_HEIGHT: 1080,
    LEVEL_LENGTH: 30, // Increased for alternative routes
    UI_SIDEBAR_WIDTH: 120,
    PARALLAX_FACTOR: 0.3,
    PLAYER_BASE_HEIGHT: 110,
    PLAYER_SCALED_HEIGHT: 137.5,
    ANIM_FPS: 10,
    REQUIRED_KEYS: 25
};

const LEVELS = [
    { id: 1, name: "The Vaults", color: "#0c0d14", accent: "#1e2135", hint: "Gather 25 keys to unlock the elevator.", bg: 'Level1Dungeon.png' },
    { id: 2, name: "Neural Pathways", color: "#1a1410", accent: "#2d241d", hint: "Exploration is mandatory.", bg: 'Level1Dungeon.png' },
    { id: 3, name: "Crystal Spires", color: "#180f1b", accent: "#2d1b33", hint: "Reach the peak of Avalon.", bg: 'Level1Dungeon.png' }
];

class Player {
    constructor() {
        this.height = CONFIG.PLAYER_SCALED_HEIGHT;
        this.width = 72;      
        this.keysCollected = 0;
        this.hasWings = false;
        this.canDoubleJump = false;
        this.assetsLoaded = false;
        this.sprites = {};
        this.animFrame = 0;
        this.animTimer = 0;
        this.state = 'idle';
        this.reset();
    }

    async loadAssets() {
        const sources = {
            idle: 'WinterIdle.png',
            walk1: 'WinterWalk1.png', 
            walk2: 'WinterWalk2.png', 
            jump: 'WinterJumpS.png',
            land: 'WinterLandS.png'
        };

        const loadImg = (src) => new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 48; canvas.height = 72;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#3498db';
                ctx.fillRect(0,0,48,72);
                resolve(canvas);
            };
            img.src = src;
        });

        const results = await Promise.all(Object.entries(sources).map(async ([key, src]) => {
            const img = await loadImg(src);
            return [key, img];
        }));

        this.sprites = Object.fromEntries(results);
        this.assetsLoaded = true;
    }

    reset() {
        this.x = 200;
        this.y = 400;
        this.vx = 0;
        this.vy = 0;
        this.grounded = false;
        this.direction = 1; 
        this.state = 'idle';
        this.animFrame = 0;
        this.animTimer = 0;
        this.keysCollected = 0;
        this.hasWings = false;
        this.canDoubleJump = false;
        this.height = CONFIG.PLAYER_SCALED_HEIGHT;
        this.updateUI();
    }

    updateUI() {
        const keySpan = document.getElementById('keys-found');
        if(keySpan) keySpan.innerText = this.keysCollected;
        
        const wingInd = document.getElementById('wing-indicator');
        if(wingInd) {
            if(this.hasWings) wingInd.classList.add('active');
            else wingInd.classList.remove('active');
        }

        // Fill Sidebar Slots
        for(let i=0; i<10; i++) {
            const slot = document.getElementById(`slot-${i}`);
            if(slot) {
                if(this.keysCollected > i) {
                    slot.innerText = "🔑";
                    slot.classList.add('active');
                } else {
                    slot.innerText = "";
                    slot.classList.remove('active');
                }
            }
        }
    }

    update(platforms, items) {
        let wasGrounded = this.grounded;
        
        if (keys['ArrowRight'] || keys['d']) {
            this.vx += CONFIG.PLAYER_SPEED;
            this.direction = 1;
        } else if (keys['ArrowLeft'] || keys['a']) {
            this.vx -= CONFIG.PLAYER_SPEED;
            this.direction = -1;
        }
        
        this.vx = Math.max(-CONFIG.MAX_SPEED, Math.min(CONFIG.MAX_SPEED, this.vx));
        this.vx *= CONFIG.FRICTION;
        this.x += this.vx;

        this.vy += CONFIG.GRAVITY;
        this.y += this.vy;
        this.grounded = false;

        const currentHeight = (this.state === 'land') ? CONFIG.PLAYER_BASE_HEIGHT : CONFIG.PLAYER_SCALED_HEIGHT;
        const hitboxPadding = this.width * 0.25;

        // Platform Collision
        for (let p of platforms) {
            if (this.x + hitboxPadding < p.x + p.w && this.x + this.width - hitboxPadding > p.x &&
                this.y < p.y + p.h && this.y + currentHeight > p.y) {
                
                // Falling on top
                if (this.vy > 0 && this.y + currentHeight - this.vy <= p.y) {
                    this.y = p.y - currentHeight;
                    this.vy = 0;
                    this.grounded = true;
                    this.canDoubleJump = this.hasWings;
                } 
                // Hit ceiling
                else if (this.vy < 0 && this.y - this.vy >= p.y + p.h) {
                    this.y = p.y + p.h;
                    this.vy = 0;
                } 
                // Wall collisions
                else if (this.vx > 0 && this.x + this.width - hitboxPadding <= p.x + 20) {
                    this.x = p.x - this.width + hitboxPadding;
                    this.vx = 0;
                } else if (this.vx < 0 && this.x + hitboxPadding >= p.x + p.w - 20) {
                    this.x = p.x + p.w - hitboxPadding;
                    this.vx = 0;
                }
            }
        }

        // Handle Jumping
        if (keys['JumpPressed']) {
            if (this.grounded) {
                this.vy = -CONFIG.JUMP_FORCE;
                this.grounded = false;
                this.state = 'jump';
                keys['JumpPressed'] = false;
            } else if (this.canDoubleJump) {
                this.vy = -CONFIG.JUMP_FORCE * 0.9;
                this.canDoubleJump = false;
                this.state = 'jump';
                keys['JumpPressed'] = false;
            }
        }

        // Animation states
        if (this.grounded) {
            if (!wasGrounded) {
                this.state = 'land';
                setTimeout(() => { if(this.state === 'land') this.state = 'idle'; }, 150);
            } else {
                if (Math.abs(this.vx) > 0.5) {
                    this.state = 'walk';
                    this.animTimer++;
                    if (this.animTimer >= 60 / CONFIG.ANIM_FPS) {
                        this.animFrame = (this.animFrame + 1) % 4; 
                        this.animTimer = 0;
                    }
                } else {
                    if (this.state !== 'land') {
                        this.state = 'idle';
                        this.animFrame = 0;
                        this.animTimer = 0;
                    }
                }
            }
        } else {
            this.state = 'jump';
        }

        // Item Collection
        for (let item of items) {
            if (!item.collected && 
                this.x < item.x + 50 && this.x + this.width > item.x &&
                this.y < item.y + 50 && this.y + currentHeight > item.y) {
                item.collected = true;
                if (item.type === 'key') {
                    this.keysCollected++;
                } else if (item.type === 'wings') {
                    this.hasWings = true;
                    this.canDoubleJump = true;
                }
                this.updateUI();
            }
        }

        // Bounds check
        if (this.y > CONFIG.INTERNAL_HEIGHT + 400) this.reset();
        if (this.x < 0) this.x = 0;
    }

    draw(ctx, cameraX) {
        if (!this.assetsLoaded) return;
        ctx.save();
        
        let screenX = this.x - cameraX;
        let img = this.sprites.idle;
        let drawH = CONFIG.PLAYER_SCALED_HEIGHT;

        if (this.state === 'jump') img = this.sprites.jump;
        else if (this.state === 'land') {
            img = this.sprites.land;
            drawH = CONFIG.PLAYER_BASE_HEIGHT;
        } else if (this.state === 'walk') {
            const seq = [this.sprites.idle, this.sprites.walk1, this.sprites.walk2, this.sprites.walk1];
            img = seq[this.animFrame] || this.sprites.idle;
        }

        if (this.direction === -1) {
            ctx.translate(screenX + this.width / 2, 0);
            ctx.scale(-1, 1);
            ctx.translate(-(screenX + this.width / 2), 0);
        }

        const aspect = img.naturalWidth / img.naturalHeight;
        const drawW = drawH * aspect;
        const xOffset = (this.width - drawW) / 2;
        
        ctx.drawImage(img, screenX + xOffset, this.y, drawW, drawH);

        // Draw Wings if enabled
        if (this.hasWings && this.state !== 'land') {
            ctx.font = "40px Arial";
            ctx.fillText("🪽", screenX - 10, this.y + 40);
        }
        
        ctx.restore();
    }
}

class Game {
    constructor() {
        this.wrapper = document.getElementById('game-wrapper');
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = CONFIG.INTERNAL_WIDTH;
        this.canvas.height = CONFIG.INTERNAL_HEIGHT;
        
        this.player = new Player();
        this.currentLevelIndex = 0;
        this.platforms = [];
        this.items = [];
        this.backgrounds = {};
        this.exit = { x: 0, y: 0, w: 120, h: 200 };
        this.cameraX = 0;
        this.isPaused = false;

        this.handleResize();
        window.addEventListener('resize', () => this.handleResize());
        this.start();
    }

    handleResize() {
        const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
        this.wrapper.style.transform = `scale(${scale})`;
    }

    async start() {
        await this.loadBackgrounds();
        await this.player.loadAssets();
        this.initLevel();
        this.loop();
    }

    async loadBackgrounds() {
        const bgSources = [...new Set(LEVELS.map(l => l.bg))];
        const loads = bgSources.map(src => new Promise(resolve => {
            const img = new Image();
            img.onload = () => resolve({src, img});
            img.onerror = () => resolve({src, img: null});
            img.src = src;
        }));
        const results = await Promise.all(loads);
        results.forEach(res => {
            if (res.img) this.backgrounds[res.src] = res.img;
        });
    }

    initLevel() {
        const levelData = LEVELS[this.currentLevelIndex];
        document.getElementById('level-name').innerText = `SECTOR ${levelData.id}: ${levelData.name.toUpperCase()}`;
        document.getElementById('objective').innerText = `CMD: ${levelData.hint}`;
        
        this.generateNonLinearLevel();
        this.player.reset();
        this.cameraX = 0;
        this.isPaused = false;
        document.getElementById('message-overlay').style.display = 'none';
    }

    generateNonLinearLevel() {
        this.platforms = [];
        this.items = [];
        
        // Start Platform
        this.platforms.push({ x: 0, y: 800, w: 600, h: 400 });
        
        let lastX = 500;
        let lastY = 800;
        let keysPlaced = 0;

        // Generate branching paths
        for (let i = 0; i < CONFIG.LEVEL_LENGTH; i++) {
            let gap = 140 + Math.random() * 100;
            let width = 300 + Math.random() * 400;
            let mainY = Math.max(200, Math.min(900, lastY + (Math.random() - 0.5) * 300));
            
            // The main path
            this.platforms.push({ x: lastX + gap, y: mainY, w: width, h: 60 });
            
            // Random chance for an alternative high/low route
            if (Math.random() > 0.4) {
                let altY = mainY + (Math.random() > 0.5 ? -250 : 250);
                altY = Math.max(150, Math.min(950, altY));
                let altWidth = 250 + Math.random() * 300;
                this.platforms.push({ x: lastX + gap + (width/4), y: altY, w: altWidth, h: 40 });
                
                // Place keys on branches primarily
                if (keysPlaced < CONFIG.REQUIRED_KEYS) {
                    this.items.push({ x: lastX + gap + (width/4) + (altWidth/2) - 20, y: altY - 60, type: 'key', collected: false });
                    keysPlaced++;
                }
            } else {
                // Key on main path if no branch
                if (keysPlaced < CONFIG.REQUIRED_KEYS && Math.random() > 0.5) {
                    this.items.push({ x: lastX + gap + width/2 - 20, y: mainY - 60, type: 'key', collected: false });
                    keysPlaced++;
                }
            }

            // Occasional Wings placement
            if (i === 5) {
                this.items.push({ x: lastX + gap + 100, y: mainY - 100, type: 'wings', collected: false });
            }

            lastX += gap + width;
            lastY = mainY;
        }

        // Fill remaining keys if generator missed some
        while (keysPlaced < CONFIG.REQUIRED_KEYS) {
            let randPlat = this.platforms[Math.floor(Math.random() * this.platforms.length)];
            this.items.push({ x: randPlat.x + randPlat.w/2, y: randPlat.y - 60, type: 'key', collected: false });
            keysPlaced++;
        }

        // Exit Platform
        this.exit.x = lastX + 200;
        this.exit.y = lastY - 200;
        this.platforms.push({ x: lastX, y: lastY, w: 800, h: 400 });
    }

    update() {
        if (this.isPaused) return;
        this.player.update(this.platforms, this.items);
        
        let targetCam = this.player.x - (CONFIG.INTERNAL_WIDTH - CONFIG.UI_SIDEBAR_WIDTH) / 3;
        this.cameraX += (targetCam - this.cameraX) * 0.08;
        this.cameraX = Math.max(0, this.cameraX);

        // Check Exit with Key Requirement
        if (this.player.x + this.player.width > this.exit.x && 
            this.player.x < this.exit.x + this.exit.w &&
            this.player.y + this.player.height > this.exit.y &&
            this.player.y < this.exit.y + this.exit.h) {
            
            if (this.player.keysCollected >= CONFIG.REQUIRED_KEYS) {
                this.completeLevel();
            }
        }
    }

    completeLevel() {
        this.isPaused = true;
        const overlay = document.getElementById('message-overlay');
        const title = document.getElementById('overlay-title');
        const text = document.getElementById('overlay-text');

        title.innerText = "SECTOR DECODED";
        text.innerText = "All keys verified. Avalon's core is within reach.";
        overlay.style.display = 'flex';
    }

    drawBackground() {
        const level = LEVELS[this.currentLevelIndex];
        const bgImg = this.backgrounds[level.bg];
        
        if (bgImg) {
            const bgScale = CONFIG.INTERNAL_HEIGHT / bgImg.naturalHeight;
            const bgWidth = bgImg.naturalWidth * bgScale;
            const parallaxX = -(this.cameraX * CONFIG.PARALLAX_FACTOR) % bgWidth;
            for (let x = parallaxX - bgWidth; x < CONFIG.INTERNAL_WIDTH; x += bgWidth) {
                this.ctx.drawImage(bgImg, x, 0, bgWidth, CONFIG.INTERNAL_HEIGHT);
            }
        } else {
            this.ctx.fillStyle = level.color;
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        }
    }

    draw() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        const level = LEVELS[this.currentLevelIndex];
        
        this.drawBackground();

        // Platforms
        for (let p of this.platforms) {
            if (p.x + p.w > this.cameraX && p.x < this.cameraX + CONFIG.INTERNAL_WIDTH) {
                this.ctx.fillStyle = level.accent;
                this.ctx.fillRect(p.x - this.cameraX, p.y, p.w, p.h);
                this.ctx.fillStyle = "rgba(255,255,255,0.08)";
                this.ctx.fillRect(p.x - this.cameraX, p.y, p.w, 3);
            }
        }

        // Items
        this.ctx.textAlign = "center";
        for (let item of this.items) {
            if (!item.collected && item.x + 80 > this.cameraX && item.x < this.cameraX + CONFIG.INTERNAL_WIDTH) {
                this.ctx.font = item.type === 'key' ? "40px Arial" : "55px Arial";
                this.ctx.fillText(item.type === 'key' ? "🔑" : "🪽", item.x - this.cameraX + 20, item.y + 35);
                
                // Subtle glow for keys
                if(item.type === 'key') {
                    this.ctx.shadowBlur = 10;
                    this.ctx.shadowColor = "gold";
                    this.ctx.strokeStyle = "rgba(255,215,0,0.3)";
                    this.ctx.lineWidth = 2;
                    this.ctx.strokeRect(item.x - this.cameraX, item.y, 40, 40);
                    this.ctx.shadowBlur = 0;
                }
            }
        }

        // Exit Door
        const exitColor = this.player.keysCollected >= CONFIG.REQUIRED_KEYS ? "rgba(0, 255, 127, 0.4)" : "rgba(255, 0, 0, 0.2)";
        this.ctx.fillStyle = exitColor;
        this.ctx.fillRect(this.exit.x - this.cameraX, this.exit.y, this.exit.w, this.exit.h);
        this.ctx.strokeStyle = this.player.keysCollected >= CONFIG.REQUIRED_KEYS ? "#00ff7f" : "var(--danger)";
        this.ctx.lineWidth = 5;
        this.ctx.strokeRect(this.exit.x - this.cameraX, this.exit.y, this.exit.w, this.exit.h);
        
        this.ctx.fillStyle = "white";
        this.ctx.font = "20px Arial";
        this.ctx.fillText(this.player.keysCollected >= CONFIG.REQUIRED_KEYS ? "UNLOCKED" : "LOCKED", this.exit.x - this.cameraX + this.exit.w/2, this.exit.y - 15);

        this.player.draw(this.ctx, this.cameraX);
    }

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
}

const keys = {};
window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') {
        keys['JumpPressed'] = true;
    }
});
window.addEventListener('keyup', e => {
    keys[e.key] = false;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') {
        keys['JumpPressed'] = false;
    }
});

let game;
