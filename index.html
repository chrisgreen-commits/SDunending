<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows & Daylight: Avalon Unending</title>
    <style>
        :root {
            --ui-gold: #ffd700;
            --ui-bg: rgba(10, 10, 15, 0.95);
            --accent: #a8dadc;
            --slot-bg: rgba(255, 255, 255, 0.05);
            --slot-border: #444;
        }
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #050505;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        #game-wrapper {
            position: relative;
            width: 1920px;
            height: 1080px;
            background: #000;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            overflow: hidden;
            transform-origin: center;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-top {
            position: absolute;
            top: 40px;
            left: 40px;
            background: var(--ui-bg);
            border-left: 5px solid var(--ui-gold);
            padding: 20px 30px;
            backdrop-filter: blur(10px);
        }
        #level-name {
            font-size: 2rem;
            font-weight: bold;
            color: var(--ui-gold);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        #objective {
            font-size: 1.1rem;
            color: #aaa;
            text-transform: uppercase;
        }
        #inventory-sidebar {
            position: absolute;
            right: 0;
            top: 0;
            width: 120px;
            height: 100%;
            background: var(--ui-bg);
            border-left: 2px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            gap: 15px;
            backdrop-filter: blur(10px);
        }
        .inv-label {
            font-size: 0.7rem;
            color: var(--ui-gold);
            margin-bottom: 10px;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.7;
        }
        .inv-slot {
            width: 70px;
            height: 70px;
            border: 2px solid var(--slot-border);
            background: var(--slot-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }
        .inv-slot.active {
            border-color: var(--ui-gold);
            background: rgba(255, 215, 0, 0.1);
            box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.2);
        }

        #message-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
            backdrop-filter: blur(15px);
        }
        #message-content h1 {
            font-size: 3.5rem;
            color: var(--ui-gold);
            margin-bottom: 20px;
        }
        #message-content p {
            font-size: 1.5rem;
            color: #ccc;
        }
        .btn {
            background: var(--ui-gold);
            color: black;
            border: none;
            padding: 20px 60px;
            font-weight: bold;
            font-size: 1.4rem;
            cursor: pointer;
            margin-top: 50px;
            text-transform: uppercase;
            transition: transform 0.1s;
            pointer-events: auto;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="hud-top">
            <div id="level-name">INITIALIZING...</div>
            <div id="objective">Waiting for Avalon to awaken.</div>
        </div>

        <div id="inventory-sidebar">
            <div class="inv-label">Storage Array</div>
            <div class="inv-slot" id="slot-0"></div>
            <div class="inv-slot" id="slot-1"></div>
            <div class="inv-slot" id="slot-2"></div>
            <div class="inv-slot" id="slot-3"></div>
            <div class="inv-slot" id="slot-4"></div>
            <div class="inv-slot" id="slot-5"></div>
            <div class="inv-slot" id="slot-6"></div>
            <div class="inv-slot" id="slot-7"></div>
            <div class="inv-slot" id="slot-8"></div>
            <div class="inv-slot" id="slot-9"></div>
        </div>
    </div>

    <div id="message-overlay">
        <div id="message-content">
            <h1 id="overlay-title">EXCALIBUR DETECTED</h1>
            <p id="overlay-text">The search continues...</p>
            <button class="btn" onclick="game.nextLevel()">ADVANCE TO NEXT SECTOR</button>
        </div>
    </div>
</div>

<script>
/**
 * SHADOWS & DAYLIGHT: AVALON UNENDING
 * 1080p Professional Version with Background Parallax
 */

const CONFIG = {
    GRAVITY: 0.45,
    FRICTION: 0.82,
    PLAYER_SPEED: 0.8,
    MAX_SPEED: 7,
    JUMP_FORCE: 14,
    INTERNAL_WIDTH: 1920,
    INTERNAL_HEIGHT: 1080,
    LEVEL_LENGTH: 25,
    UI_SIDEBAR_WIDTH: 120,
    PARALLAX_FACTOR: 0.5 // Background moves at half speed
};

const LEVELS = [
    { id: 1, name: "The Dungeon", color: "#0c0d14", accent: "#1e2135", hint: "Search for a way up.", bg: 'Level1Dungeon.png' },
    { id: 2, name: "Servant Tunnels", color: "#1a1410", accent: "#2d241d", hint: "Navigate the mess of the kitchens.", bg: 'Level1Dungeon.png' },
    { id: 3, name: "The Grand Ballroom", color: "#180f1b", accent: "#2d1b33", hint: "The finery hides many secrets.", bg: 'Level1Dungeon.png' },
    { id: 4, name: "The Armory", color: "#1a1a1a", accent: "#2b2b2b", hint: "Excalibur must be here.", bg: 'Level1Dungeon.png' },
    { id: 5, name: "Avalon Roof", color: "#0d1421", accent: "#16233a", hint: "To the helicopter!", combat: true, bg: 'Level1Dungeon.png' }
];

class Player {
    constructor() {
        this.baseHeight = 110; 
        this.width = 72;      
        this.height = this.baseHeight;
        this.reset();
        this.inventory = [];
        this.assetsLoaded = false;
        this.sprites = {};
        this.animTimer = 0;
        this.state = 'idle';
    }

    async loadAssets() {
        const sources = {
            idle: 'WinterIdle.png',
            walk: 'WinterWalk1.png', 
            jump: 'WinterJumpS.png',
            land: 'WinterLandS.png'
        };

        const loadImg = (src) => new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 48; canvas.height = 72;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#3498db';
                ctx.fillRect(0,0,48,72);
                resolve(canvas);
            };
            img.src = src;
        });

        const results = await Promise.all(Object.entries(sources).map(async ([key, src]) => {
            const img = await loadImg(src);
            return [key, img];
        }));

        this.sprites = Object.fromEntries(results);
        
        if (this.sprites.idle && this.sprites.idle.naturalHeight) {
            const aspectRatio = this.sprites.idle.naturalWidth / this.sprites.idle.naturalHeight;
            this.width = this.height * aspectRatio;
        }
        this.assetsLoaded = true;
    }

    reset() {
        this.x = 200;
        this.y = 400;
        this.vx = 0;
        this.vy = 0;
        this.grounded = false;
        this.direction = 1; 
        this.state = 'idle';
    }

    update(platforms, items) {
        let wasGrounded = this.grounded;
        let isMoving = false;

        if (keys['ArrowRight'] || keys['d']) {
            this.vx += CONFIG.PLAYER_SPEED;
            this.direction = 1;
            isMoving = true;
        } else if (keys['ArrowLeft'] || keys['a']) {
            this.vx -= CONFIG.PLAYER_SPEED;
            this.direction = -1;
            isMoving = true;
        }
        
        this.vx = Math.max(-CONFIG.MAX_SPEED, Math.min(CONFIG.MAX_SPEED, this.vx));
        this.vx *= CONFIG.FRICTION;
        this.x += this.vx;

        this.vy += CONFIG.GRAVITY;
        this.y += this.vy;
        this.grounded = false;

        const hitboxPadding = this.width * 0.25;
        for (let p of platforms) {
            if (this.x + hitboxPadding < p.x + p.w && this.x + this.width - hitboxPadding > p.x &&
                this.y < p.y + p.h && this.y + this.height > p.y) {
                if (this.vy > 0 && this.y + this.height - this.vy <= p.y) {
                    this.y = p.y - this.height;
                    this.vy = 0;
                    this.grounded = true;
                } else if (this.vy < 0 && this.y - this.vy >= p.y + p.h) {
                    this.y = p.y + p.h;
                    this.vy = 0;
                } else if (this.vx > 0 && this.x + this.width - hitboxPadding <= p.x + 20) {
                    this.x = p.x - this.width + hitboxPadding;
                    this.vx = 0;
                } else if (this.vx < 0 && this.x + hitboxPadding >= p.x + p.w - 20) {
                    this.x = p.x + p.w - hitboxPadding;
                    this.vx = 0;
                }
            }
        }

        if ((keys['ArrowUp'] || keys['w'] || keys[' ']) && this.grounded) {
            this.vy = -CONFIG.JUMP_FORCE;
            this.grounded = false;
            this.state = 'jump';
        }

        if (this.grounded) {
            if (!wasGrounded) {
                this.state = 'land';
            } else {
                if (Math.abs(this.vx) > 0.1) {
                    this.state = 'walk';
                    this.animTimer++;
                } else {
                    if (this.state !== 'land') this.state = 'idle';
                }
            }
        } else {
            this.state = 'jump';
        }

        for (let item of items) {
            if (!item.collected && 
                this.x < item.x + 40 && this.x + this.width > item.x &&
                this.y < item.y + 40 && this.y + this.height > item.y) {
                item.collected = true;
                this.addToInventory(item);
            }
        }

        if (this.y > CONFIG.INTERNAL_HEIGHT + 400) this.reset();
    }

    addToInventory(item) {
        if (this.inventory.length < 10) {
            this.inventory.push(item);
            const slot = document.getElementById(`slot-${this.inventory.length - 1}`);
            slot.innerHTML = `<span style="color: gold; font-size: 30px;">★</span>`; 
            slot.classList.add('active');
        }
    }

    draw(ctx, cameraX) {
        ctx.save();
        let screenX = this.x - cameraX;
        
        if (this.direction === -1) {
            ctx.translate(screenX + this.width / 2, 0);
            ctx.scale(-1, 1);
            ctx.translate(-(screenX + this.width / 2), 0);
        }

        if (this.assetsLoaded) {
            let img = this.sprites.idle;
            let bounce = 0;

            switch(this.state) {
                case 'jump': img = this.sprites.jump; break;
                case 'land': img = this.sprites.land; break;
                case 'walk': 
                    img = this.sprites.walk; 
                    bounce = Math.sin(this.animTimer * 0.2) * 5;
                    break;
                default: img = this.sprites.idle;
            }

            const drawW = img.naturalWidth ? (this.height * (img.naturalWidth / img.naturalHeight)) : this.width;
            const xOffset = (this.width - drawW) / 2;
            ctx.drawImage(img, screenX + xOffset, this.y + bounce, drawW, this.height);
        }
        ctx.restore();
    }
}

class Game {
    constructor() {
        this.wrapper = document.getElementById('game-wrapper');
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = CONFIG.INTERNAL_WIDTH;
        this.canvas.height = CONFIG.INTERNAL_HEIGHT;
        
        this.player = new Player();
        this.currentLevelIndex = 0;
        this.platforms = [];
        this.items = [];
        this.backgrounds = {};
        this.exit = { x: 0, y: 0, w: 100, h: 160 };
        this.cameraX = 0;
        this.isPaused = false;

        this.handleResize();
        window.addEventListener('resize', () => this.handleResize());
        this.start();
    }

    handleResize() {
        const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
        this.wrapper.style.transform = `scale(${scale})`;
    }

    async start() {
        await this.loadBackgrounds();
        await this.player.loadAssets();
        this.initLevel();
        this.loop();
    }

    async loadBackgrounds() {
        const bgSources = [...new Set(LEVELS.map(l => l.bg))];
        const loads = bgSources.map(src => new Promise(resolve => {
            const img = new Image();
            img.onload = () => resolve({src, img});
            img.onerror = () => resolve({src, img: null});
            img.src = src;
        }));
        const results = await Promise.all(loads);
        results.forEach(res => {
            if (res.img) this.backgrounds[res.src] = res.img;
        });
    }

    initLevel() {
        const levelData = LEVELS[this.currentLevelIndex];
        document.getElementById('level-name').innerText = `SECTOR ${levelData.id}: ${levelData.name.toUpperCase()}`;
        document.getElementById('objective').innerText = `CMD: ${levelData.hint}`;
        
        this.generateLevel();
        this.player.reset();
        this.cameraX = 0;
        this.isPaused = false;
        document.getElementById('message-overlay').style.display = 'none';
    }

    generateLevel() {
        this.platforms = [];
        this.items = [];
        this.platforms.push({ x: 0, y: 800, w: 800, h: 400 });
        let lastX = 700;
        let lastY = 800;

        for (let i = 0; i < CONFIG.LEVEL_LENGTH; i++) {
            let gap = 150 + Math.random() * 120;
            let width = 300 + Math.random() * 400;
            let heightChange = (Math.random() - 0.5) * 250;
            let nextX = lastX + gap;
            let nextY = Math.max(300, Math.min(900, lastY + heightChange));
            this.platforms.push({ x: nextX, y: nextY, w: width, h: 60 });
            
            if (Math.random() > 0.4) {
                this.items.push({ x: nextX + width/2 - 20, y: nextY - 60, collected: false });
            }
            lastX = nextX + width;
            lastY = nextY;
        }

        this.exit.x = lastX - 200;
        this.exit.y = lastY - 160;
        this.platforms.push({ x: lastX - 400, y: lastY, w: 800, h: 400 });
    }

    nextLevel() {
        this.currentLevelIndex++;
        if (this.currentLevelIndex >= LEVELS.length) this.currentLevelIndex = 0;
        this.initLevel();
    }

    update() {
        if (this.isPaused) return;
        this.player.update(this.platforms, this.items);
        
        let targetCam = this.player.x - (CONFIG.INTERNAL_WIDTH - CONFIG.UI_SIDEBAR_WIDTH) / 3;
        this.cameraX += (targetCam - this.cameraX) * 0.08;
        this.cameraX = Math.max(0, this.cameraX);

        if (this.player.x + this.player.width > this.exit.x && 
            this.player.x < this.exit.x + this.exit.w &&
            this.player.y + this.player.height > this.exit.y &&
            this.player.y < this.exit.y + this.exit.h) {
            this.completeLevel();
        }
    }

    completeLevel() {
        this.isPaused = true;
        const overlay = document.getElementById('message-overlay');
        const title = document.getElementById('overlay-title');
        const text = document.getElementById('overlay-text');

        if (this.currentLevelIndex === 3) {
            title.innerText = "EXCALIBUR ACQUIRED";
            text.innerText = "The power of Avalon is yours. Proceed to the roof for extraction.";
        } else {
            title.innerText = "SECTOR SECURED";
            let nextPlace = LEVELS[this.currentLevelIndex + 1]?.name || "Final Conflict";
            text.innerText = `Data suggests Excalibur is located in ${nextPlace}.`;
        }
        overlay.style.display = 'flex';
    }

    drawBackground() {
        const level = LEVELS[this.currentLevelIndex];
        const bgImg = this.backgrounds[level.bg];
        
        if (bgImg) {
            // Scale image to fit screen height
            const bgScale = CONFIG.INTERNAL_HEIGHT / bgImg.naturalHeight;
            const bgWidth = bgImg.naturalWidth * bgScale;
            
            // Calculate parallax offset
            const parallaxX = -(this.cameraX * CONFIG.PARALLAX_FACTOR) % bgWidth;
            
            // Draw tiles to cover screen
            for (let x = parallaxX - bgWidth; x < CONFIG.INTERNAL_WIDTH; x += bgWidth) {
                this.ctx.drawImage(bgImg, x, 0, bgWidth, CONFIG.INTERNAL_HEIGHT);
            }
        } else {
            // Fallback gradient
            let grad = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
            grad.addColorStop(0, level.color);
            grad.addColorStop(1, "#050505");
            this.ctx.fillStyle = grad;
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        }
    }

    draw() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        const level = LEVELS[this.currentLevelIndex];
        
        this.drawBackground();

        // Platforms
        for (let p of this.platforms) {
            if (p.x + p.w > this.cameraX && p.x < this.cameraX + CONFIG.INTERNAL_WIDTH) {
                this.ctx.fillStyle = level.accent;
                this.ctx.fillRect(p.x - this.cameraX, p.y, p.w, p.h);
                // Detail line
                this.ctx.fillStyle = "rgba(255,255,255,0.1)";
                this.ctx.fillRect(p.x - this.cameraX, p.y, p.w, 4);
            }
        }

        // Items
        for (let item of this.items) {
            if (!item.collected && item.x + 40 > this.cameraX && item.x < this.cameraX + CONFIG.INTERNAL_WIDTH) {
                this.ctx.fillStyle = "gold";
                this.ctx.shadowBlur = 15;
                this.ctx.shadowColor = "gold";
                this.ctx.beginPath();
                this.ctx.arc(item.x - this.cameraX + 20, item.y + 20, 12, 0, Math.PI*2);
                this.ctx.fill();
                this.ctx.shadowBlur = 0;
            }
        }

        // Exit
        this.ctx.fillStyle = "rgba(0,0,0,0.8)";
        this.ctx.fillRect(this.exit.x - this.cameraX, this.exit.y, this.exit.w, this.exit.h);
        this.ctx.strokeStyle = "gold";
        this.ctx.lineWidth = 4;
        this.ctx.strokeRect(this.exit.x - this.cameraX, this.exit.y, this.exit.w, this.exit.h);

        this.player.draw(this.ctx, this.cameraX);
    }

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
}

const keys = {};
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

let game;
window.onload = () => {
    game = new Game();
};
</script>
</body>
</html>
