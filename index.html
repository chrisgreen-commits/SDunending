<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows & Daylight: Avalon Unending</title>
    <style>
        :root {
            --ui-gold: #ffd700;
            --ui-bg: rgba(20, 20, 25, 0.9);
            --accent: #a8dadc;
        }
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', Courier, monospace;
            color: white;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 4px solid #222;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            width: calc(100% - 40px);
        }
        .hud-box {
            background: var(--ui-bg);
            border: 2px solid var(--ui-gold);
            padding: 15px;
            border-radius: 4px;
            display: inline-block;
            min-width: 250px;
        }
        #level-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--ui-gold);
            margin-bottom: 5px;
        }
        #objective {
            font-size: 0.9rem;
            color: #ccc;
        }
        #inventory {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: var(--ui-bg);
            padding: 15px;
            border: 2px solid #444;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .inv-slot {
            width: 60px;
            height: 60px;
            border: 2px solid #555;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: all 0.2s;
        }
        .inv-slot.active { border-color: var(--ui-gold); }
        .inv-slot img { max-width: 80%; max-height: 80%; }

        #message-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        #message-content {
            max-width: 600px;
            padding: 40px;
            border-top: 2px solid var(--ui-gold);
            border-bottom: 2px solid var(--ui-gold);
        }
        .btn {
            background: var(--ui-gold);
            color: black;
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: transform 0.1s;
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="hud-box">
            <div id="level-name">LEVEL 1: THE DUNGEON</div>
            <div id="objective">Objective: Find the exit to the tunnels.</div>
        </div>
    </div>

    <div id="inventory">
        <div class="inv-slot" id="slot-0"></div>
        <div class="inv-slot" id="slot-1"></div>
        <div class="inv-slot" id="slot-2"></div>
        <div class="inv-slot" id="slot-3"></div>
    </div>

    <div id="message-overlay">
        <div id="message-content">
            <h1 id="overlay-title" style="color: var(--ui-gold); margin-bottom: 20px;">EXCALIBUR IS IN ANOTHER PART OF THE CASTLE.</h1>
            <p id="overlay-text" style="line-height: 1.6; font-size: 1.1rem;">The search continues in the Servant Tunnels...</p>
            <button class="btn" onclick="game.nextLevel()">CONTINUE SEARCH</button>
        </div>
    </div>
</div>

<script>
/**
 * SHADOWS & DAYLIGHT: AVALON UNENDING
 */

const CONFIG = {
    GRAVITY: 0.45,
    FRICTION: 0.82,
    PLAYER_SPEED: 0.7,
    MAX_SPEED: 5,
    JUMP_FORCE: 11,
    VIEWPORT_WIDTH: 1000,
    VIEWPORT_HEIGHT: 600,
    LEVEL_LENGTH: 20 // Number of procedural segments
};

const LEVELS = [
    { id: 1, name: "The Dungeon", color: "#1a1c2c", accent: "#333", hint: "Search for a way up." },
    { id: 2, name: "Servant Tunnels", color: "#2a2118", accent: "#4a3b2b", hint: "Navigate the mess of the kitchens." },
    { id: 3, name: "The Grand Ballroom", color: "#2d1b33", accent: "#4d2b59", hint: "The finery hides many secrets." },
    { id: 4, name: "The Armory", color: "#2e2e2e", accent: "#444", hint: "Excalibur must be here." },
    { id: 5, name: "Avalon Roof", color: "#1a2a44", accent: "#2a3a5a", hint: "To the helicopter!", combat: true }
];

class Player {
    constructor() {
        this.width = 48; 
        this.height = 72;
        this.reset();
        this.inventory = [];
        
        // Sprite management
        this.assetsLoaded = false;
        this.idleImg = new Image();
        this.walkImg = new Image();
        this.loadAssets();

        this.animTimer = 0;
        this.animFrame = 0;
        this.state = 'idle'; // 'idle', 'walk', 'jump'
    }

    loadAssets() {
        let loadedCount = 0;
        const total = 2;
        const onload = () => {
            loadedCount++;
            if(loadedCount === total) this.assetsLoaded = true;
        };
        this.idleImg.onload = onload;
        this.walkImg.onload = onload;
        
        this.idleImg.src = 'WinterIdle.png';
        this.walkImg.src = 'WinterWalk1.png';
    }

    reset() {
        this.x = 100;
        this.y = 300;
        this.vx = 0;
        this.vy = 0;
        this.grounded = false;
        this.direction = 1; 
    }

    update(platforms, items) {
        let moving = false;
        if (keys['ArrowRight'] || keys['d']) {
            this.vx += CONFIG.PLAYER_SPEED;
            this.direction = 1;
            moving = true;
        } else if (keys['ArrowLeft'] || keys['a']) {
            this.vx -= CONFIG.PLAYER_SPEED;
            this.direction = -1;
            moving = true;
        }
        
        this.vx = Math.max(-CONFIG.MAX_SPEED, Math.min(CONFIG.MAX_SPEED, this.vx));
        this.vx *= CONFIG.FRICTION;
        this.x += this.vx;

        this.vy += CONFIG.GRAVITY;
        this.y += this.vy;
        this.grounded = false;

        // Platform Collisions
        for (let p of platforms) {
            if (this.x + 10 < p.x + p.w && this.x + this.width - 10 > p.x &&
                this.y < p.y + p.h && this.y + this.height > p.y) {
                
                if (this.vy > 0 && this.y + this.height - this.vy <= p.y) {
                    this.y = p.y - this.height;
                    this.vy = 0;
                    this.grounded = true;
                }
                else if (this.vy < 0 && this.y - this.vy >= p.y + p.h) {
                    this.y = p.y + p.h;
                    this.vy = 0;
                }
                else if (this.vx > 0 && this.x + this.width - 10 <= p.x + 10) {
                    this.x = p.x - this.width + 10;
                    this.vx = 0;
                } else if (this.vx < 0 && this.x + 10 >= p.x + p.w - 10) {
                    this.x = p.x + p.w - 10;
                    this.vx = 0;
                }
            }
        }

        // Jump logic
        if ((keys['ArrowUp'] || keys['w'] || keys[' ']) && this.grounded) {
            this.vy = -CONFIG.JUMP_FORCE;
            this.grounded = false;
        }

        // Item collection
        for (let item of items) {
            if (!item.collected && 
                this.x < item.x + 30 && this.x + this.width > item.x &&
                this.y < item.y + 30 && this.y + this.height > item.y) {
                item.collected = true;
                this.addToInventory(item);
            }
        }

        // Animation state
        if (!this.grounded) {
            this.state = 'jump';
        } else if (Math.abs(this.vx) > 0.2) {
            this.state = 'walk';
            this.animTimer++;
        } else {
            this.state = 'idle';
        }

        if (this.y > CONFIG.VIEWPORT_HEIGHT + 200) this.reset();
    }

    addToInventory(item) {
        if (this.inventory.length < 4) {
            this.inventory.push(item);
            const slot = document.getElementById(`slot-${this.inventory.length - 1}`);
            slot.innerHTML = `<span style="color: gold; font-size: 20px;">★</span>`; // Placeholder icon
            slot.classList.add('active');
        }
    }

    draw(ctx, cameraX) {
        ctx.save();
        
        // Flip image based on direction
        let drawX = this.x - cameraX;
        if (this.direction === -1) {
            ctx.scale(-1, 1);
            drawX = -drawX - this.width;
        }

        if (this.assetsLoaded) {
            let img = this.state === 'walk' ? this.walkImg : this.idleImg;
            
            // Simple bounce animation for walk if only 1 frame available
            let bounce = 0;
            if (this.state === 'walk') {
                bounce = Math.sin(this.animTimer * 0.2) * 3;
            }

            ctx.drawImage(img, drawX, this.y + bounce, this.width, this.height);
        } else {
            // Fallback
            ctx.fillStyle = "#3498db";
            ctx.fillRect(drawX, this.y, this.width, this.height);
        }

        ctx.restore();
    }
}

class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = CONFIG.VIEWPORT_WIDTH;
        this.canvas.height = CONFIG.VIEWPORT_HEIGHT;
        
        this.player = new Player();
        this.currentLevelIndex = 0;
        this.platforms = [];
        this.items = [];
        this.exit = { x: 0, y: 0, w: 70, h: 100 };
        this.cameraX = 0;
        this.isPaused = false;

        this.initLevel();
        this.loop();
    }

    initLevel() {
        const levelData = LEVELS[this.currentLevelIndex];
        document.getElementById('level-name').innerText = `LEVEL ${levelData.id}: ${levelData.name.toUpperCase()}`;
        document.getElementById('objective').innerText = `Objective: ${levelData.hint}`;
        
        this.generateLevel();
        this.player.reset();
        this.cameraX = 0;
        this.isPaused = false;
        document.getElementById('message-overlay').style.display = 'none';
    }

    generateLevel() {
        this.platforms = [];
        this.items = [];
        
        // Starting block
        this.platforms.push({ x: 0, y: 500, w: 500, h: 200, type: 'stone' });

        let lastX = 400;
        let lastY = 500;

        for (let i = 0; i < CONFIG.LEVEL_LENGTH; i++) {
            let gap = 100 + Math.random() * 80;
            let width = 200 + Math.random() * 250;
            let heightChange = (Math.random() - 0.5) * 180;
            
            let nextX = lastX + gap;
            let nextY = Math.max(200, Math.min(520, lastY + heightChange));

            this.platforms.push({ x: nextX, y: nextY, w: width, h: 40 });

            // Random decorative or mystery items
            if (Math.random() > 0.6) {
                this.items.push({
                    x: nextX + width/2 - 15,
                    y: nextY - 40,
                    collected: false,
                    name: 'Mystery Relic'
                });
            }

            lastX = nextX + width;
            lastY = nextY;
        }

        // Exit Area
        this.exit.x = lastX - 120;
        this.exit.y = lastY - 100;
        this.platforms.push({ x: lastX - 200, y: lastY, w: 400, h: 200 });
    }

    nextLevel() {
        this.currentLevelIndex++;
        if (this.currentLevelIndex < LEVELS.length) {
            this.initLevel();
        } else {
            this.currentLevelIndex = 0;
            this.initLevel();
        }
    }

    update() {
        if (this.isPaused) return;

        this.player.update(this.platforms, this.items);

        // Smooth Camera
        let targetCam = this.player.x - CONFIG.VIEWPORT_WIDTH / 3;
        this.cameraX += (targetCam - this.cameraX) * 0.08;
        this.cameraX = Math.max(0, this.cameraX);

        // Exit Trigger
        if (this.player.x + this.player.width > this.exit.x && 
            this.player.x < this.exit.x + this.exit.w &&
            this.player.y + this.player.height > this.exit.y &&
            this.player.y < this.exit.y + this.exit.h) {
            this.completeLevel();
        }
    }

    completeLevel() {
        this.isPaused = true;
        const overlay = document.getElementById('message-overlay');
        const title = document.getElementById('overlay-title');
        const text = document.getElementById('overlay-text');

        if (this.currentLevelIndex === 3) {
            title.innerText = "YOU FOUND EXCALIBUR!";
            text.innerText = "The power of Avalon surges through you. The roof is the only way out, but the shadows have sent their best. Fight your way to the extraction point.";
        } else {
            title.innerText = "EXCALIBUR IS IN ANOTHER PART OF THE CASTLE.";
            let nextPlace = LEVELS[this.currentLevelIndex + 1]?.name || "The Depths";
            text.innerText = `Excalibur's resonance is stronger further up. You must enter ${nextPlace}.`;
        }
        
        overlay.style.display = 'flex';
    }

    draw() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        const level = LEVELS[this.currentLevelIndex];

        // Background Gradient
        let grad = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
        grad.addColorStop(0, level.color);
        grad.addColorStop(1, "#000");
        this.ctx.fillStyle = grad;
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        // Draw Platforms
        for (let p of this.platforms) {
            if (p.x + p.w > this.cameraX && p.x < this.cameraX + CONFIG.VIEWPORT_WIDTH) {
                this.ctx.fillStyle = level.accent;
                this.ctx.fillRect(p.x - this.cameraX, p.y, p.w, p.h);
                this.ctx.strokeStyle = "rgba(255,255,255,0.1)";
                this.ctx.strokeRect(p.x - this.cameraX, p.y, p.w, p.h);
            }
        }

        // Draw Items
        for (let item of this.items) {
            if (!item.collected && item.x + 30 > this.cameraX && item.x < this.cameraX + CONFIG.VIEWPORT_WIDTH) {
                this.ctx.fillStyle = "rgba(255, 215, 0, " + (0.5 + Math.sin(Date.now()*0.005)*0.5) + ")";
                this.ctx.beginPath();
                this.ctx.arc(item.x - this.cameraX + 15, item.y + 15, 8, 0, Math.PI*2);
                this.ctx.fill();
            }
        }

        // Draw Exit (Doorway)
        this.ctx.fillStyle = "#111";
        this.ctx.fillRect(this.exit.x - this.cameraX, this.exit.y, this.exit.w, this.exit.h);
        this.ctx.strokeStyle = varColor('--ui-gold');
        this.ctx.lineWidth = 3;
        this.ctx.strokeRect(this.exit.x - this.cameraX, this.exit.y, this.exit.w, this.exit.h);

        this.player.draw(this.ctx, this.cameraX);
    }

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
}

function varColor(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

const keys = {};
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

let game;
window.onload = () => {
    game = new Game();
};
</script>
</body>
</html>
