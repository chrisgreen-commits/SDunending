<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows & Daylight: Avalon Unending</title>
    <style>
        :root {
            --ui-gold: #ffd700;
            --ui-bg: rgba(15, 15, 25, 0.98);
            --accent: #a8dadc;
            --danger: #ff4d4d;
            --platform-grey: #8d9196;
            --platform-highlight: #b0b4b9;
        }
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #050505;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        #game-wrapper {
            position: relative;
            width: 1920px;
            height: 1080px;
            background: #000;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            overflow: hidden;
            transform-origin: center;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-top {
            position: absolute;
            top: 40px;
            left: 40px;
            background: var(--ui-bg);
            border-left: 5px solid var(--ui-gold);
            padding: 20px 30px;
            backdrop-filter: blur(10px);
            min-width: 450px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }
        #level-name {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--ui-gold);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        #objective-label {
            font-size: 1.1rem;
            color: #aaa;
            text-transform: uppercase;
        }
        #key-counter {
            margin-top: 15px;
            font-size: 1.6rem;
            color: var(--ui-gold);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .hud-powerup {
            position: absolute;
            bottom: 40px;
            left: 40px;
            background: var(--ui-bg);
            padding: 20px 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
        }
        .hud-powerup.active {
            opacity: 1;
            transform: translateY(0);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            border: 2px solid var(--ui-gold);
        }

        #message-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
            backdrop-filter: blur(20px);
        }
        #message-content h1 {
            font-size: 4rem;
            color: var(--ui-gold);
            margin-bottom: 20px;
            letter-spacing: 5px;
        }
        #message-content p {
            font-size: 1.5rem;
            color: #ccc;
            max-width: 800px;
            line-height: 1.6;
        }
        .btn {
            background: var(--ui-gold);
            color: black;
            border: none;
            padding: 20px 60px;
            font-weight: bold;
            font-size: 1.4rem;
            cursor: pointer;
            margin-top: 50px;
            text-transform: uppercase;
            transition: all 0.2s;
            pointer-events: auto;
        }
        .btn:hover { 
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="hud-top">
            <div id="level-name">INITIALIZING...</div>
            <div id="objective-container">
                <span id="objective-label">OBJECTIVE: </span>
                <span id="objective-text" style="color: #ccc; text-transform: uppercase;">Locate all Access Keys.</span>
            </div>
            <div id="key-counter">🔑 <span id="keys-found">0</span> / 25</div>
        </div>

        <div class="hud-powerup" id="wing-indicator">
            <span style="font-size: 3rem; filter: drop-shadow(0 0 10px gold);">🪽</span>
            <div>
                <div style="font-size: 1.4rem; font-weight: bold; color: var(--ui-gold); letter-spacing: 1px;">AERIAL ASCENSION</div>
                <div style="font-size: 0.9rem; color: #fff; opacity: 0.8; text-transform: uppercase;">Double Jump Online</div>
            </div>
        </div>
    </div>

    <div id="message-overlay">
        <div id="message-content">
            <h1 id="overlay-title">LEVEL COMPLETE</h1>
            <p id="overlay-text">The journey into Avalon continues...</p>
            <button class="btn" id="next-btn" onclick="game.nextLevel()">LOAD NEXT LEVEL</button>
        </div>
    </div>
</div>

<script>
/**
 * SHADOWS & DAYLIGHT: AVALON UNENDING
 * Fix: Forced Run animation cycle priority to resolve broken walk cycle overlaps.
 * Fix: Wing depth logic maintained while cleaning up state machine.
 */

const CONFIG = {
    GRAVITY: 0.45,
    FRICTION: 0.82,
    WALK_SPEED: 0.9,
    RUN_SPEED: 1.8,
    MAX_WALK_SPEED: 7.5,
    MAX_RUN_SPEED: 13.0,
    JUMP_FORCE: 14.5,
    INTERNAL_WIDTH: 1920,
    INTERNAL_HEIGHT: 1080,
    LEVEL_LENGTH: 30,
    PARALLAX_FACTOR: 0.3,
    PLAYER_BASE_HEIGHT: 206,      
    PLAYER_CROUCH_HEIGHT: 154, 
    REQUIRED_KEYS: 25,
    MIN_HEAD_CLEARANCE: 260, 
    MAX_JUMP_REACH: 440,
    BRICK_SIZE: 60,
    BRICK_HEALTH: 3,
    ATTACK_COOLDOWN: 15,
    PLATFORM_COLOR: '#8d9196',
    PLATFORM_HIGHLIGHT: '#b0b4b9',
    KICK_SCALE: 1.25
};

const LEVELS = [
    { id: 1, name: "Avalon Dungeon", color: "#0c0d14", accent: CONFIG.PLATFORM_COLOR, hint: "Punch down through bricks to find hidden paths.", bg: 'Level1Dungeon.png' },
    { id: 2, name: "Neural Pathways", color: "#1a1410", accent: CONFIG.PLATFORM_COLOR, hint: "Kick through obstacles in your way.", bg: 'Level1Dungeon.png' },
    { id: 3, name: "Crystal Spires", color: "#180f1b", accent: CONFIG.PLATFORM_COLOR, hint: "Reach the peak of Avalon.", bg: 'Level1Dungeon.png' }
];

class Particle {
    constructor(x, y, text) {
        this.x = x;
        this.y = y;
        this.text = text;
        this.life = 60;
        this.vy = -1.5;
        this.opacity = 1.0;
    }
    update() {
        this.y += this.vy;
        this.life--;
        this.opacity = this.life / 60;
    }
    draw(ctx, cameraX) {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = "white";
        ctx.font = "bold 24px Courier New";
        ctx.shadowBlur = 4;
        ctx.shadowColor = "black";
        ctx.fillText(this.text, this.x - cameraX, this.y);
        ctx.restore();
    }
}

class Brick {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.w = CONFIG.BRICK_SIZE;
        this.h = CONFIG.BRICK_SIZE;
        this.health = CONFIG.BRICK_HEALTH;
        this.destroyed = false;
        this.flash = 0;
    }
    damage() {
        this.health--;
        this.flash = 10;
        if (this.health <= 0) this.destroyed = true;
    }
    draw(ctx, cameraX) {
        if (this.destroyed) return;
        const screenX = this.x - cameraX;
        ctx.fillStyle = this.flash > 0 ? '#fff' : CONFIG.PLATFORM_COLOR;
        if (this.flash > 0) this.flash--;
        ctx.fillRect(screenX, this.y, this.w, this.h);
        ctx.strokeStyle = CONFIG.PLATFORM_HIGHLIGHT;
        ctx.lineWidth = 2;
        ctx.strokeRect(screenX + 2, this.y + 2, this.w - 4, this.h - 4);
        if (this.health < CONFIG.BRICK_HEALTH) {
            ctx.beginPath();
            ctx.strokeStyle = "rgba(0,0,0,0.5)";
            ctx.moveTo(screenX + 10, this.y + 10);
            ctx.lineTo(screenX + 40, this.y + 40);
            if (this.health === 1) {
                ctx.moveTo(screenX + 50, this.y + 10);
                ctx.lineTo(screenX + 10, this.y + 50);
            }
            ctx.stroke();
        }
    }
}

class Player {
    constructor(game) {
        this.game = game;
        this.baseHeight = CONFIG.PLAYER_BASE_HEIGHT;
        this.width = 108;
        this.keysCollected = 0;
        this.hasWings = false;
        this.canDoubleJump = false;
        this.assetsLoaded = false;
        this.sprites = {};
        this.animFrame = 0;
        this.animTimer = 0;
        this.state = 'idle';
        this.lastTapTime = 0;
        this.lastTapKey = null;
        this.isRunning = false;
        this.attackTimer = 0;
        this.landTimer = 0;
        this.groundedFrames = 0;
        this.reset();
    }

    async loadAssets() {
        const sources = {
            idle: 'WinterIdle.png',
            walk1: 'WinterWalk1.png', 
            walk2: 'WinterWalk2.png', 
            walk3: 'WinterWalk3.png',
            run1: 'WinterRun1.png',
            run2: 'WinterRun2.png',
            jump: 'WinterJumpS.png',
            land: 'WinterLandS.png',
            kick: 'WinterKick.png'
        };
        const loadImg = (src) => new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 100; canvas.height = 150;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#3498db';
                ctx.fillRect(0,0,100,150);
                resolve(canvas);
            };
            img.src = src;
        });
        const results = await Promise.all(Object.entries(sources).map(async ([key, src]) => {
            const img = await loadImg(src);
            return [key, img];
        }));
        this.sprites = Object.fromEntries(results);
        this.assetsLoaded = true;
    }

    spawnAt(x, y) {
        this.x = x;
        this.y = y - CONFIG.PLAYER_BASE_HEIGHT; 
        this.vx = 0;
        this.vy = 0;
        this.grounded = true;
        this.state = 'idle';
        this.updateUI();
    }

    reset() {
        this.vx = 0;
        this.vy = 0;
        this.grounded = false;
        this.direction = 1; 
        this.state = 'idle';
        this.isRunning = false;
        this.animFrame = 0;
        this.animTimer = 0;
        this.keysCollected = 0;
        this.hasWings = false;
        this.canDoubleJump = false;
        this.attackTimer = 0;
        this.landTimer = 0;
        this.groundedFrames = 0;
        this.updateUI();
    }

    updateUI() {
        const keySpan = document.getElementById('keys-found');
        if(keySpan) keySpan.innerText = this.keysCollected;
        const wingInd = document.getElementById('wing-indicator');
        if(wingInd) {
            if(this.hasWings) wingInd.classList.add('active');
            else wingInd.classList.remove('active');
        }
    }

    handleInput() {
        const inputLeft = keys['ArrowLeft'] || keys['a'];
        const inputRight = keys['ArrowRight'] || keys['d'];
        
        // If movement stops, running state drops immediately
        if (!inputLeft && !inputRight) {
            this.isRunning = false;
        }

        const accel = this.isRunning ? CONFIG.RUN_SPEED : CONFIG.WALK_SPEED;
        const max = this.isRunning ? CONFIG.MAX_RUN_SPEED : CONFIG.MAX_WALK_SPEED;

        if (inputRight) {
            this.vx += accel;
            this.direction = 1;
        } else if (inputLeft) {
            this.vx -= accel;
            this.direction = -1;
        }
        
        this.vx = Math.max(-max, Math.min(max, this.vx));
    }

    performPunch(bricks) {
        if (this.attackTimer > 0) return;
        const px = this.x + this.width / 2;
        const currentH = (this.isRunning && this.grounded) ? CONFIG.PLAYER_CROUCH_HEIGHT : CONFIG.PLAYER_BASE_HEIGHT;
        const py = this.y + currentH + 20;
        for (let b of bricks) {
            if (!b.destroyed && px > b.x && px < b.x + b.w && py > b.y && py < b.y + b.h + 20) {
                b.damage();
                this.attackTimer = CONFIG.ATTACK_COOLDOWN;
                break;
            }
        }
    }

    performKick(bricks) {
        if (this.attackTimer > 0) return;
        const kx = this.direction === 1 ? this.x + this.width + 10 : this.x - 30;
        const currentH = (this.isRunning && this.grounded) ? CONFIG.PLAYER_CROUCH_HEIGHT : CONFIG.PLAYER_BASE_HEIGHT;
        const ky = this.y + currentH / 2;
        for (let b of bricks) {
            if (!b.destroyed && kx > b.x && kx < b.x + b.w && ky > b.y && ky < b.y + b.h) {
                b.damage();
                this.attackTimer = CONFIG.ATTACK_COOLDOWN;
                break;
            }
        }
    }

    update(bricks, items) {
        const wasGrounded = this.grounded;
        if (this.attackTimer > 0) this.attackTimer--;

        this.handleInput();

        this.vx *= CONFIG.FRICTION;
        this.x += this.vx;
        this.vy += CONFIG.GRAVITY;
        this.y += this.vy;
        
        let foundGround = false;
        const isPunching = keys['ArrowDown'] || keys['s'];
        const isKicking = keys['KickPressed'];

        const horizontalSpeed = Math.abs(this.vx);
        if (horizontalSpeed < 0.2) {
            this.isRunning = false;
        }

        const isLowProfile = (this.isRunning && this.grounded) || isPunching;
        let currentPhysHeight = isLowProfile ? CONFIG.PLAYER_CROUCH_HEIGHT : CONFIG.PLAYER_BASE_HEIGHT;
        const hitboxPadding = 30;

        if (isPunching && this.grounded) this.performPunch(bricks);
        if (isKicking) this.performKick(bricks);

        for (let b of bricks) {
            if (b.destroyed) continue;
            if (this.x + hitboxPadding < b.x + b.w && this.x + this.width - hitboxPadding > b.x &&
                this.y < b.y + b.h && this.y + currentPhysHeight > b.y) {
                
                if (this.vy >= 0 && this.y + currentPhysHeight - this.vy <= b.y + 35) {
                    this.y = b.y - currentPhysHeight;
                    this.vy = 0;
                    foundGround = true;
                    if (this.hasWings) this.canDoubleJump = true;
                } else if (this.vy < 0 && this.y - this.vy >= b.y + b.h - 35) {
                    this.y = b.y + b.h;
                    this.vy = 0;
                    b.damage();
                    const mouthX = this.direction === 1 ? this.x + this.width - 20 : this.x + 20;
                    this.game.addParticle(mouthX, this.y + 40, "Ow!");
                } else if (this.vx > 0 && this.x + this.width - hitboxPadding <= b.x + 20) {
                    this.x = b.x - this.width + hitboxPadding;
                    this.vx = 0;
                } else if (this.vx < 0 && this.x + hitboxPadding >= b.x + b.w - 20) {
                    this.x = b.x + b.w - hitboxPadding;
                    this.vx = 0;
                }
            }
        }

        this.grounded = foundGround;
        if (this.grounded) this.groundedFrames++;
        else this.groundedFrames = 0;

        if (keys['JumpPressed']) {
            if (this.grounded || (this.hasWings && this.canDoubleJump)) {
                this.vy = this.grounded ? -CONFIG.JUMP_FORCE : -CONFIG.JUMP_FORCE * 0.95;
                if (!this.grounded) this.canDoubleJump = false;
                this.grounded = false;
                keys['JumpPressed'] = false;
            }
        }

        // --- STRICT ANIMATION STATE LOGIC ---
        let newState;

        if (!this.grounded) {
            newState = isKicking ? 'kick' : 'jump';
        } else if (!wasGrounded) {
            newState = 'land';
            this.landTimer = 6;
        } else if (this.landTimer > 0) {
            newState = 'land';
            this.landTimer--;
        } else if (isKicking) {
            newState = 'kick';
        } else if (isPunching) {
            newState = 'land';
        } else if (this.isRunning && Math.abs(this.vx) > 2.0) {
            // STRICT RUN PRIORITY: If we are running, nothing else (walk/idle) can take over
            newState = 'run';
        } else if (Math.abs(this.vx) > 0.5) {
            newState = 'walk';
        } else {
            newState = 'idle';
        }

        // Handle transitions
        if (this.state !== newState) {
            this.animFrame = 0;
            this.animTimer = 0;
        }
        this.state = newState;

        // Step animation cycles
        if (this.state === 'run') {
            if (this.animTimer++ >= 4) { // Fast run speed
                this.animFrame = (this.animFrame + 1) % 2;
                this.animTimer = 0;
            }
        } else if (this.state === 'walk') {
            if (this.animTimer++ >= 6) {
                this.animFrame = (this.animFrame + 1) % 4;
                this.animTimer = 0;
            }
        }

        // Items
        for (let item of items) {
            if (!item.collected && 
                this.x < item.x + 50 && this.x + this.width > item.x &&
                this.y < item.y + 60 && this.y + currentPhysHeight > item.y) {
                item.collected = true;
                if (item.type === 'key') this.keysCollected++;
                else if (item.type === 'wings') {
                    this.hasWings = true;
                    this.canDoubleJump = true;
                }
                this.updateUI();
            }
        }

        if (this.y > CONFIG.INTERNAL_HEIGHT + 1000) {
            let respawn = bricks.find(b => !b.destroyed);
            if (respawn) this.spawnAt(respawn.x, respawn.y - 200);
            else this.spawnAt(0, 500);
        }
        if (this.x < 0) this.x = 0;
    }

    draw(ctx, cameraX) {
        if (!this.assetsLoaded) return;
        ctx.save();
        
        let screenX = this.x - cameraX;
        let img = this.sprites.idle;
        let targetDrawH = CONFIG.PLAYER_BASE_HEIGHT;
        let scaleFactor = 1.0;

        // STRICT ASSET SELECTION
        switch(this.state) {
            case 'run':
                // ONLY use run1 and run2 when running
                img = this.animFrame === 0 ? this.sprites.run1 : this.sprites.run2;
                targetDrawH = CONFIG.PLAYER_CROUCH_HEIGHT;
                break;
            case 'jump':
                img = this.sprites.jump;
                targetDrawH = CONFIG.PLAYER_BASE_HEIGHT;
                break;
            case 'land':
                img = this.sprites.land;
                targetDrawH = CONFIG.PLAYER_CROUCH_HEIGHT;
                break;
            case 'kick':
                img = this.sprites.kick;
                targetDrawH = CONFIG.PLAYER_BASE_HEIGHT;
                scaleFactor = CONFIG.KICK_SCALE; 
                break;
            case 'walk':
                const walkCycle = [this.sprites.idle, this.sprites.walk1, this.sprites.walk2, this.sprites.walk3];
                img = walkCycle[this.animFrame % 4];
                targetDrawH = CONFIG.PLAYER_BASE_HEIGHT;
                break;
            default:
                img = this.sprites.idle;
                targetDrawH = CONFIG.PLAYER_BASE_HEIGHT;
        }

        const aspectRatio = img.naturalWidth / img.naturalHeight;
        let finalDrawH = targetDrawH * scaleFactor;
        let finalDrawW = (targetDrawH * aspectRatio) * scaleFactor;
        this.width = targetDrawH * aspectRatio;

        let yDrawOffset = (targetDrawH - finalDrawH); 
        const wingY = this.y + 70;
        const wingOpacity = 0.85 + Math.sin(Date.now() / 150) * 0.1;

        // Wing BEHIND
        if (this.hasWings) {
            ctx.save();
            ctx.font = "64px Arial"; 
            ctx.globalAlpha = wingOpacity;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "gold";
            if (this.direction === 1) {
                ctx.translate(screenX - 45 + 32, wingY - 32);
                ctx.scale(-1, 1);
                ctx.fillText("🪽", -32, 32);
            } else {
                ctx.fillText("🪽", screenX + finalDrawW + 5, wingY);
            }
            ctx.restore();
        }

        // Player Sprite
        ctx.save();
        if (this.direction === -1) {
            ctx.translate(screenX + (finalDrawW / 2), 0);
            ctx.scale(-1, 1);
            ctx.translate(-(screenX + (finalDrawW / 2)), 0);
        }
        ctx.drawImage(img, screenX, this.y + yDrawOffset, finalDrawW, finalDrawH);
        ctx.restore();

        // Wing IN FRONT
        if (this.hasWings) {
            ctx.save();
            ctx.font = "64px Arial"; 
            ctx.globalAlpha = wingOpacity;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "gold";
            if (this.direction === 1) {
                ctx.fillText("🪽", screenX + finalDrawW + 5, wingY);
            } else {
                ctx.translate(screenX - 45 + 32, wingY - 32);
                ctx.scale(-1, 1);
                ctx.fillText("🪽", -32, 32);
            }
            ctx.restore();
        }

        ctx.restore();
    }
}

class Game {
    constructor() {
        this.wrapper = document.getElementById('game-wrapper');
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = CONFIG.INTERNAL_WIDTH;
        this.canvas.height = CONFIG.INTERNAL_HEIGHT;
        this.player = new Player(this);
        this.currentLevelIndex = 0;
        this.bricks = [];
        this.items = [];
        this.particles = [];
        this.backgrounds = {};
        this.exit = { x: 0, y: 0, w: 120, h: 220 };
        this.cameraX = 0;
        this.isPaused = false;
        this.handleResize();
        window.addEventListener('resize', () => this.handleResize());
        this.start();
    }
    addParticle(x, y, text) { this.particles.push(new Particle(x, y, text)); }
    handleResize() {
        const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
        this.wrapper.style.transform = `scale(${scale})`;
    }
    async start() {
        await this.loadBackgrounds();
        await this.player.loadAssets();
        this.initLevel();
        this.loop();
    }
    async loadBackgrounds() {
        const bgSources = [...new Set(LEVELS.map(l => l.bg))];
        const loads = bgSources.map(src => new Promise(resolve => {
            const img = new Image();
            img.onload = () => resolve({src, img});
            img.onerror = () => resolve({src, img: null});
            img.src = src;
        }));
        const results = await Promise.all(loads);
        results.forEach(res => { if (res.img) this.backgrounds[res.src] = res.img; });
    }
    initLevel() {
        const levelData = LEVELS[this.currentLevelIndex];
        document.getElementById('level-name').innerText = `LEVEL ${levelData.id}: ${levelData.name.toUpperCase()}`;
        document.getElementById('objective-text').innerText = levelData.hint;
        this.generateLevel();
        this.player.reset();
        this.particles = [];
        const firstBrick = this.bricks[0];
        this.player.spawnAt(firstBrick.x + 100, firstBrick.y);
        this.cameraX = 0;
        this.isPaused = false;
        document.getElementById('message-overlay').style.display = 'none';
    }
    createPlatform(x, y, w, h) {
        const cols = Math.ceil(w / CONFIG.BRICK_SIZE);
        const rows = Math.ceil(h / CONFIG.BRICK_SIZE);
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                this.bricks.push(new Brick(x + c * CONFIG.BRICK_SIZE, y + r * CONFIG.BRICK_SIZE));
            }
        }
    }
    generateLevel() {
        this.bricks = [];
        this.items = [];
        this.createPlatform(0, 800, 900, 400);
        let lastX = 800, lastY = 800, keysPlaced = 0, wingsPlaced = false;
        for (let i = 0; i < CONFIG.LEVEL_LENGTH; i++) {
            let gap = 180 + Math.random() * 120, width = 420 + Math.random() * 420;
            let diff = (Math.random() - 0.5) * 350;
            let mainY = Math.max(250, Math.min(850, lastY + diff));
            if (mainY < lastY - CONFIG.MAX_JUMP_REACH) mainY = lastY - CONFIG.MAX_JUMP_REACH;
            this.createPlatform(lastX + gap, mainY, width, 60);
            if (Math.random() > 0.6) this.createPlatform(lastX + gap + (width/3), mainY - 300, 60, 300);
            if (Math.random() > 0.45) {
                let altYOffset = CONFIG.MIN_HEAD_CLEARANCE + 60 + (Math.random() * 80);
                let altY = Math.max(120, Math.min(940, mainY + (Math.random() > 0.5 ? altYOffset : -altYOffset)));
                let altWidth = 320 + Math.random() * 280;
                this.createPlatform(lastX + gap + 40, altY, altWidth, 60);
                if (keysPlaced < CONFIG.REQUIRED_KEYS) {
                    this.items.push({ x: lastX + gap + 100 + (altWidth/2), y: altY - 80, type: 'key', collected: false });
                    keysPlaced++;
                }
                if (!wingsPlaced && i > 3 && Math.random() > 0.65) {
                    this.items.push({ x: lastX + gap + 150, y: altY - 100, type: 'wings', collected: false });
                    wingsPlaced = true;
                }
            } else {
                if (keysPlaced < CONFIG.REQUIRED_KEYS && Math.random() > 0.5) {
                    this.items.push({ x: lastX + gap + width/2, y: mainY - 80, type: 'key', collected: false });
                    keysPlaced++;
                }
            }
            lastX += gap + width; lastY = mainY;
        }
        if (!wingsPlaced) {
            let p = this.bricks[Math.floor(this.bricks.length / 2)];
            this.items.push({ x: p.x, y: p.y - 120, type: 'wings', collected: false });
        }
        while (keysPlaced < CONFIG.REQUIRED_KEYS) {
            let p = this.bricks[Math.floor(Math.random() * this.bricks.length)];
            this.items.push({ x: p.x, y: p.y - 80, type: 'key', collected: false });
            keysPlaced++;
        }
        this.exit.x = lastX + 150; this.exit.y = lastY - 220;
        this.createPlatform(lastX, lastY, 900, 400);
    }
    update() {
        if (this.isPaused) return;
        this.player.update(this.bricks, this.items);
        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].update();
            if (this.particles[i].life <= 0) this.particles.splice(i, 1);
        }
        let targetCam = this.player.x - (CONFIG.INTERNAL_WIDTH / 3);
        this.cameraX += (targetCam - this.cameraX) * 0.1;
        this.cameraX = Math.max(0, this.cameraX);
        const playerH = (this.player.isRunning && this.player.grounded) ? CONFIG.PLAYER_CROUCH_HEIGHT : CONFIG.PLAYER_BASE_HEIGHT;
        if (this.player.x + this.player.width > this.exit.x && 
            this.player.x < this.exit.x + this.exit.w &&
            this.player.y + playerH > this.exit.y &&
            this.player.y < this.exit.y + this.exit.h) {
            if (this.player.keysCollected >= CONFIG.REQUIRED_KEYS) this.completeLevel();
        }
    }
    completeLevel() {
        this.isPaused = true;
        document.getElementById('message-overlay').style.display = 'flex';
    }
    nextLevel() {
        this.currentLevelIndex++;
        if (this.currentLevelIndex >= LEVELS.length) this.currentLevelIndex = 0;
        this.initLevel();
    }
    drawBackground() {
        const level = LEVELS[this.currentLevelIndex];
        const bgImg = this.backgrounds[level.bg];
        if (bgImg) {
            const bgScale = CONFIG.INTERNAL_HEIGHT / bgImg.naturalHeight;
            const bgWidth = bgImg.naturalWidth * bgScale;
            const parallaxX = -(this.cameraX * CONFIG.PARALLAX_FACTOR) % bgWidth;
            for (let x = parallaxX - bgWidth; x < CONFIG.INTERNAL_WIDTH; x += bgWidth) {
                this.ctx.drawImage(bgImg, x, 0, bgWidth, CONFIG.INTERNAL_HEIGHT);
            }
        } else {
            this.ctx.fillStyle = level.color;
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        }
    }
    draw() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.drawBackground();
        for (let b of this.bricks) {
            if (b.x + b.w > this.cameraX && b.x < this.cameraX + CONFIG.INTERNAL_WIDTH) b.draw(this.ctx, this.cameraX);
        }
        this.ctx.textAlign = "center";
        for (let item of this.items) {
            if (!item.collected && item.x + 100 > this.cameraX && item.x < this.cameraX + CONFIG.INTERNAL_WIDTH) {
                this.ctx.shadowBlur = 25;
                this.ctx.shadowColor = item.type === 'key' ? "gold" : "cyan";
                this.ctx.font = item.type === 'key' ? "55px Arial" : "75px Arial";
                const bounce = Math.sin(Date.now() / 300) * 15;
                this.ctx.fillText(item.type === 'key' ? "🔑" : "🪽", item.x - this.cameraX, item.y + bounce);
                this.ctx.shadowBlur = 0;
            }
        }
        const ready = this.player.keysCollected >= CONFIG.REQUIRED_KEYS;
        this.ctx.fillStyle = ready ? "rgba(0, 255, 127, 0.3)" : "rgba(255, 0, 0, 0.2)";
        this.ctx.fillRect(this.exit.x - this.cameraX, this.exit.y, this.exit.w, this.exit.h);
        this.ctx.strokeStyle = ready ? "#00ff7f" : "var(--danger)";
        this.ctx.strokeRect(this.exit.x - this.cameraX, this.exit.y, this.exit.w, this.exit.h);
        this.ctx.fillStyle = ready ? "#00ff7f" : "white";
        this.ctx.font = "bold 24px Courier New";
        this.ctx.fillText(ready ? "OPEN" : "LOCKED", this.exit.x - this.cameraX + this.exit.w/2, this.exit.y + this.exit.h/2);
        this.player.draw(this.ctx, this.cameraX);
        for (let p of this.particles) p.draw(this.ctx, this.cameraX);
    }
    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
}

const keys = {};
window.addEventListener('keydown', e => {
    const now = Date.now(), key = e.key.toLowerCase();
    const isMoveKey = (key === 'd' || key === 'arrowright' || key === 'a' || key === 'arrowleft');
    if (isMoveKey && !keys[key]) {
        if (key === game.player.lastTapKey && (now - game.player.lastTapTime) < 300) {
            game.player.isRunning = true;
        }
        game.player.lastTapTime = now; 
        game.player.lastTapKey = key;
    }
    keys[key] = true;
    if (key === 'arrowup' || key === 'w') keys['JumpPressed'] = true;
    if (key === ' ' || key === 'r') keys['KickPressed'] = true;
});
window.addEventListener('keyup', e => {
    const key = e.key.toLowerCase();
    keys[key] = false;
    if (key === 'arrowup' || key === 'w') keys['JumpPressed'] = false;
    if (key === ' ' || key === 'r') keys['KickPressed'] = false;
});
let game;
window.onload = () => { game = new Game(); };
</script>
